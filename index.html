<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Modern Öğrenci Paneli</title>
    
    <!-- Üst Düzey Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6' } 
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'floating 3s ease-in-out infinite',
                    },
                    keyframes: {
                        floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } }
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: moveOrb 25s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* ÖZEL İMLEÇ */
        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%232563eb" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, .cursor-pointer { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        /* LİKİT CAM TASARIMI */
        .glass-card {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(37, 99, 235, 0.4) !important; }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }

        /* SABİT LOGO */
        .logo-fixed { position: fixed; top: 32px; left: 32px; z-index: 1000; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.3)); }

        /* REELS SİSTEMİ */
        .reels-wrapper { height: calc(100vh - 120px); width: 100%; max-width: 450px; margin: 0 auto; border-radius: 3rem; overflow: hidden; background: #000; border: 4px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .reels-container { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item { height: 100%; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .reel-video { width: 100%; height: 100%; object-fit: contain; }
        .reel-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .reel-actions { position: absolute; right: 15px; bottom: 80px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }

        /* SCROLLBAR */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }

        .view-fade { animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .logo-fixed { top: 16px; left: 16px; }
            .logo-fixed img { height: 32px; }
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row !important; border-right: 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; background: #020617; }
            .sidebar-link span { display: none; }
            main { padding-bottom: 90px !important; }
        }
    </style>
</head>
<body class="dark overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- YÜKLEME EKRANI -->
    <div id="loading" class="fixed inset-0 z-[2000] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="h-16 w-16 border-4 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 animate-pulse">SİSTEM BAĞLANTISI KURULUYOR</p>
    </div>

    <!-- SABİT LOGO -->
    <div class="logo-fixed animate__animated animate__fadeInDown">
        <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 md:h-14 w-auto object-contain">
    </div>

    <!-- LANDING / LOGIN -->
    <div id="landing-page" class="fixed inset-0 z-[1500] bg-darkBg hidden flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full glass-card p-12 rounded-[3.5rem] shadow-2xl text-center border border-white/10 animate__animated animate__zoomIn">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" class="h-16 mx-auto mb-10 drop-shadow-xl">
            <h3 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-8">Öğrenci Portalı</h3>
            <form onsubmit="window.handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition" placeholder="Şifre">
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black uppercase shadow-lg hover:brightness-110 transition tracking-widest mt-4">Giriş Yap</button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-xs font-bold hidden"></div>
        </div>
    </div>

    <!-- ANA PLATFORM -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 glass-card border-r border-white/5 flex flex-col h-screen shrink-0 sidebar-fixed">
            <div class="p-10 text-center h-32 hidden md:flex items-center justify-center"></div>
            <nav class="flex-1 px-4 py-4 space-y-2 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-6 border-t border-white/5 hidden md:block">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black" id="user-avatar">?</div>
                    <div class="overflow-hidden"><p class="text-xs font-black truncate" id="user-name-display">...</p><p class="text-[9px] font-bold text-slate-500 uppercase">Öğrenci</p></div>
                </div>
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[10px] uppercase transition border border-red-500/10">Çıkış Yap</button>
            </div>
        </aside>

        <!-- İçerik -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="main-scroll-area">
            <header class="p-6 md:px-12 md:pt-16 flex justify-between items-center h-32 shrink-0" id="main-header">
                <h1 class="text-3xl md:text-5xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                <div id="header-stat" class="hidden lg:flex px-6 py-3 liquid-inner border border-white/10 rounded-2xl font-black text-xs text-blue-400 shadow-xl">
                    BAŞARI PUANI: <span id="header-p-total" class="ml-2 text-white">0</span>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>
    </div>

    <!-- MODALLAR (ZIRHLI) -->
    <div id="pdf-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl hidden items-center justify-center p-4 z-[3000]">
        <div class="w-full max-w-6xl h-[90vh] glass-card rounded-[3rem] shadow-2xl flex flex-col overflow-hidden relative">
            <div class="p-5 border-b border-white/10 flex justify-between items-center liquid-inner">
                <h3 class="font-black text-white uppercase italic text-sm" id="pdf-title">Belge</h3>
                <button onclick="closePdf()" class="w-10 h-10 liquid-inner rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <iframe id="pdf-frame" src="" class="flex-1 w-full bg-slate-900 border-0"></iframe>
        </div>
    </div>

    <div id="upload-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl hidden items-center justify-center p-6 z-[3000]">
        <div class="max-w-xl w-full glass-card p-10 rounded-[4rem] shadow-2xl border border-white/10 animate__animated animate__fadeInUp">
            <button onclick="closeUpload()" class="absolute top-8 right-8 text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 class="text-2xl font-black mb-8 italic uppercase text-white">Çözüm Fotoğrafları Yükle</h3>
            <form onsubmit="window.submitSolution(event)" class="space-y-6">
                <input type="hidden" id="upload-hw-id">
                <div id="selected-files" class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar"></div>
                <button type="button" onclick="document.getElementById('file-input').click()" class="w-full p-10 border-2 border-dashed border-blue-500/30 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] hover:bg-blue-500/5 transition-all">
                    <i class="fa-solid fa-camera text-3xl mb-3 block"></i>FOTOĞRAF EKLE
                </button>
                <input type="file" id="file-input" class="hidden" multiple accept="image/*" onchange="window.handleFiles(this)">
                <textarea id="upload-note" placeholder="Eklemek istediğin not..." class="w-full p-5 rounded-2xl liquid-inner outline-none text-white h-32 border border-white/5"></textarea>
                <button type="submit" id="upload-btn" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black uppercase shadow-lg">GÖNDERİMİ TAMAMLA</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let userProfile = null, selectedFiles = [], reelsObserver = null;

        // AUTH
        async function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('login-btn'); btn.disabled = true;
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error').innerText = error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; } 
            else { location.reload(); }
        }

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (data && data.role === 'student') {
                    userProfile = data; 
                    document.getElementById('user-name-display').innerText = data.full_name;
                    document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                    document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                    renderSidebar(); navigate(localStorage.getItem('lastView') || 'dashboard');
                    window.startHeartbeat();
                } else { logout(); }
            } else { document.getElementById('landing-page').classList.remove('hidden'); document.getElementById('landing-page').classList.add('flex'); }
            document.getElementById('loading').classList.add('opacity-0'); setTimeout(()=>document.getElementById('loading').remove(), 500);
        }

        window.startHeartbeat = () => {
            const up = async () => { if(userProfile) await supabaseClient.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', userProfile.id); };
            up(); setInterval(up, 60000);
        };

        // NAVİGASYON
        function renderSidebar() {
            const items = [{id:'dashboard',n:'Dashboard',i:'fa-chart-line'},{id:'s-lessons',n:'Derslerim',i:'fa-video'},{id:'s-exams',n:'Sınavlarım',i:'fa-file-signature'},{id:'s-homeworks',n:'Ödevlerim',i:'fa-book-open-reader'},{id:'s-files',n:'Dosyalarım',i:'fa-folder-open'},{id:'s-videos',n:'Kısa Videolar',i:'fa-play-circle'},{id:'s-analytics',n:'Analizlerim',i:'fa-chart-pie'}];
            document.getElementById('sidebar-nav').innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-5 px-8 py-5 rounded-[2rem] font-bold text-[11px] uppercase tracking-widest transition hover:bg-white/5"><i class="fa-solid ${x.i} text-xl w-8 text-center"></i><span>${x.n}</span></button>`).join('');
        }

        async function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const btn = document.getElementById('nav-'+v); if(btn) btn.classList.add('active');
            localStorage.setItem('lastView', v);
            const cont = document.getElementById('view-content');
            const header = document.getElementById('main-header');
            const scrollArea = document.getElementById('main-scroll-area');
            
            cont.innerHTML = '<div class="p-20 flex justify-center"><i class="fa-solid fa-atom fa-spin text-5xl text-blue-600"></i></div>';
            
            if(v === 's-videos') { header.classList.add('hidden'); scrollArea.classList.remove('overflow-y-auto'); scrollArea.classList.add('overflow-hidden'); cont.classList.remove('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.add('p-0', 'max-w-full'); }
            else { header.classList.remove('hidden'); scrollArea.classList.add('overflow-y-auto'); scrollArea.classList.remove('overflow-hidden'); cont.classList.add('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.remove('p-0', 'max-w-full'); if(reelsObserver) reelsObserver.disconnect(); }

            if(v === 'dashboard') await renderDashboard();
            else if(v === 's-lessons') await renderLessons();
            else if(v === 's-exams') await renderExams();
            else if(v === 's-homeworks') await renderHomeworks();
            else if(v === 's-files') await renderFiles();
            else if(v === 's-videos') await renderVideos();
            else if(v === 's-analytics') await renderAnalytics();
        }

        // MODÜL RENDERERS (ZIRHLI VERİ AKIŞI)
        async function renderDashboard() {
            document.getElementById('page-title').innerText = 'Dashboard';
            const { data: p } = await supabaseClient.from('points').select('amount').eq('student_id', userProfile.id);
            const total = (p || []).reduce((a, b) => a + b.amount, 0);
            document.getElementById('header-p-total').innerText = total;

            const { data: next } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).neq('is_completed', true).order('scheduled_at').limit(1).maybeSingle();
            
            document.getElementById('view-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-10">
                    <div class="bg-blue-600 p-16 rounded-[4rem] text-white shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group">
                        <span class="text-xs uppercase font-black opacity-70 mb-4 tracking-[0.4em]">Başarı Skoru</span>
                        <h2 class="text-[12rem] font-black leading-none drop-shadow-2xl animate__animated animate__pulse animate__infinite">${total}</h2>
                        <i class="fa-solid fa-crown absolute -right-4 -bottom-4 text-[12rem] opacity-10 group-hover:rotate-12 transition-all"></i>
                    </div>
                    <div class="space-y-6">
                        <div class="glass-card p-10 rounded-[3rem] border-l-4 border-l-orange-500">
                            <h4 class="text-xs font-black uppercase text-slate-500 mb-6 italic tracking-widest">Sıradaki Oturum</h4>
                            ${next ? `<div><h3 class="text-2xl font-black uppercase italic text-white mb-2">${next.title}</h3><p class="text-sm font-bold text-orange-500">${new Date(next.scheduled_at).toLocaleString('tr-TR')}</p></div>` : '<p class="opacity-40 italic">Planlı ders yok.</p>'}
                        </div>
                        <div class="glass-card p-10 rounded-[3rem] flex items-center justify-between">
                            <div><h4 class="text-xs font-black uppercase text-slate-500 mb-2">Sistem Durumu</h4><p class="text-green-500 font-black uppercase text-sm tracking-widest animate-pulse"><i class="fa-solid fa-shield-halved mr-2"></i>Tüm Birimler Aktif</p></div>
                            <i class="fa-solid fa-microchip text-4xl opacity-10"></i>
                        </div>
                    </div>
                </div>`;
        }

        async function renderLessons() {
            document.getElementById('page-title').innerText = 'Ders Programı';
            const { data } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).order('scheduled_at', {ascending: true});
            const active = (data||[]).filter(l => !l.is_completed);
            const past = (data||[]).filter(l => l.is_completed);

            document.getElementById('view-content').innerHTML = `
                <div class="space-y-12">
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${active.map(l => `
                            <div class="glass-card p-10 rounded-[3.5rem] h-96 flex flex-col justify-between group">
                                <div class="w-14 h-14 rounded-2xl liquid-inner flex items-center justify-center text-blue-500 text-2xl border border-blue-500/20 shadow-inner group-hover:scale-110 transition"><i class="fa-solid fa-video"></i></div>
                                <div><h4 class="text-2xl font-black text-white italic uppercase mb-2">${l.title}</h4><p class="text-xs font-bold text-slate-500">${new Date(l.scheduled_at).toLocaleString('tr-TR')}</p></div>
                                <a href="${l.link}" target="_blank" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-center shadow-xl tracking-widest hover:brightness-110 transition">OTURUMA KATIL</a>
                            </div>
                        `).join('') || '<div class="col-span-full py-20 text-center opacity-30 font-black uppercase italic tracking-widest border-2 border-dashed border-white/5 rounded-3xl">Planlı oturum yok.</div>'}
                    </div>
                    <div class="pt-10 border-t border-white/5">
                        <h4 class="text-[10px] font-black uppercase text-slate-500 mb-6 italic tracking-widest">Arşivlenmiş Oturumlar</h4>
                        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6 opacity-60">
                            ${past.map(l => `<div class="glass-card p-6 rounded-3xl grayscale"><h5 class="font-bold text-sm text-white mb-1 uppercase">${l.title}</h5><p class="text-[9px] font-bold text-slate-500">${new Date(l.scheduled_at).toLocaleDateString('tr-TR')}</p></div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        async function renderHomeworks() {
            document.getElementById('page-title').innerText = 'Ödev Takibi';
            const { data: hws } = await supabaseClient.from('homeworks').select('*').eq('student_id', userProfile.id).neq('is_completed', true);
            const { data: subs } = await supabaseClient.from('homework_submissions').select('homework_id').eq('student_id', userProfile.id);
            const subSet = new Set((subs||[]).map(s => s.homework_id));

            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${(hws||[]).map(h => {
                        const sent = subSet.has(h.id);
                        return `
                        <div class="glass-card p-10 rounded-[3.5rem] h-[450px] flex flex-col justify-between relative overflow-hidden group">
                            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/5 rounded-full group-hover:scale-150 transition-transform duration-1000"></div>
                            <div>
                                <div class="flex justify-between items-start mb-10">
                                    <div class="w-14 h-14 rounded-2xl liquid-inner flex items-center justify-center text-orange-500 text-2xl border border-orange-500/20"><i class="fa-solid fa-file-invoice"></i></div>
                                    ${sent ? '<span class="px-4 py-2 bg-green-500 text-white rounded-full text-[8px] font-black uppercase shadow-lg">İLETİLDİ</span>' : '<span class="px-4 py-2 bg-orange-500 text-white rounded-full text-[8px] font-black uppercase shadow-lg animate-pulse">BEKLİYOR</span>'}
                                </div>
                                <h4 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-4">${h.title}</h4>
                                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest"><i class="fa-regular fa-clock mr-1"></i> SON: ${new Date(h.deadline).toLocaleString('tr-TR')}</p>
                            </div>
                            <div class="space-y-4">
                                <button onclick="openPdf('${h.pdf_url}', '${h.title}')" class="w-full py-4 border border-blue-500/30 text-blue-400 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">ÖDEVİ İNCELE</button>
                                ${sent ? '<div class="p-4 liquid-inner text-center text-green-500 font-black text-[10px] uppercase tracking-widest border border-green-500/20"><i class="fa-solid fa-check-double mr-2"></i>ÇÖZÜM GÖNDERİLDİ</div>' : `<button onclick="openUpload('${h.id}')" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-xs uppercase shadow-xl hover:brightness-110 transition">ÇÖZÜMÜ YÜKLE</button>`}
                            </div>
                        </div>`;
                    }).join('') || '<div class="col-span-full py-20 text-center opacity-30 font-black italic">Atanmış ödev bulunmuyor.</div>'}
                </div>`;
        }

        async function renderFiles() {
            document.getElementById('page-title').innerText = 'Dosya Arşivi';
            const { data } = await supabaseClient.from('course_files').select('*').or(`student_id.is.null,student_id.eq.${userProfile.id}`).order('created_at', {ascending: false});
            
            document.getElementById('view-content').innerHTML = `
                <div class="max-w-4xl mx-auto space-y-4">
                    ${(data||[]).map(f => `
                        <div class="glass-card p-6 rounded-3xl flex items-center justify-between group transition-all hover:bg-white/5">
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 liquid-inner text-red-500 rounded-xl flex items-center justify-center text-2xl shadow-inner border border-white/5"><i class="fa-solid fa-file-pdf"></i></div>
                                <div><h5 class="font-black text-white text-sm uppercase tracking-tight">${f.title}</h5><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">${new Date(f.created_at).toLocaleDateString('tr-TR')} • Bilimsel Döküman</p></div>
                            </div>
                            <button onclick="openPdf('${f.file_url}', '${f.title}')" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-105 transition-all">Görüntüle</button>
                        </div>
                    `).join('') || '<p class="text-center opacity-30 italic">Paylaşılan dosya bulunmuyor.</p>'}
                </div>`;
        }

        async function renderVideos() {
            const { data: vids } = await supabaseClient.from('videos').select('*').order('created_at', {ascending: false});
            if(!vids || vids.length === 0) { document.getElementById('view-content').innerHTML = '<div class="h-full flex items-center justify-center opacity-40 italic">Video yok.</div>'; return; }
            
            document.getElementById('view-content').innerHTML = `
                <div class="flex h-full w-full justify-center items-center p-4 lg:p-10 animate__animated animate__fadeIn">
                    <div class="reels-wrapper">
                        <div class="reels-container" id="reels-scroller">
                            ${vids.map(v => `
                                <div class="reel-item">
                                    <video src="${v.video_url}" loop playsinline class="reel-video cursor-pointer" onclick="this.paused ? this.play() : this.pause()"></video>
                                    <div class="reel-overlay">
                                        <div class="mb-4 flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white">A</div><span class="text-xs font-black text-white drop-shadow-md">Ali Şengül</span></div>
                                        <h4 class="text-sm font-bold text-white leading-relaxed drop-shadow-lg pr-12">${v.title}</h4>
                                    </div>
                                    <div class="reel-actions">
                                        <button class="flex flex-col items-center gap-1"><div class="w-14 h-14 rounded-full glass-card flex items-center justify-center text-white text-xl"><i class="fa-solid fa-heart"></i></div><span class="text-[9px] font-black uppercase">BEĞEN</span></button>
                                        <button class="flex flex-col items-center gap-1"><div class="w-14 h-14 rounded-full glass-card flex items-center justify-center text-white text-xl"><i class="fa-solid fa-comment"></i></div><span class="text-[9px] font-black uppercase">YORUM</span></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;

            const scroller = document.getElementById('reels-scroller');
            const videos = scroller.querySelectorAll('video');
            reelsObserver = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) { e.target.play(); } else { e.target.pause(); e.target.currentTime = 0; } });
            }, { threshold: 0.8 });
            videos.forEach(v => reelsObserver.observe(v));
        }

        async function renderAnalytics() {
            document.getElementById('page-title').innerText = 'Analiz Merkezi';
            const { data } = await supabaseClient.from('detailed_analyses').select('*').eq('student_id', userProfile.id).order('created_at', {ascending: false});
            
            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                    ${(data||[]).map(a => `
                        <div class="glass-card p-10 rounded-[3.5rem] h-[480px] flex flex-col justify-between group">
                            <div>
                                <div class="flex justify-between items-center mb-8">
                                    <span class="px-4 py-1 liquid-inner border border-white/10 rounded-lg text-[9px] font-black uppercase text-blue-400">${a.type === 'exam' ? 'Sınav' : 'Ödev'}</span>
                                    <h2 class="text-4xl font-black text-white">%${Math.round((a.correct_count/a.total_questions)*100)}</h2>
                                </div>
                                <h4 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-6">${a.title}</h4>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="text-center p-4 liquid-inner border border-green-500/20"><p class="text-lg font-black text-green-500">${a.correct_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">Doğru</p></div>
                                    <div class="text-center p-4 liquid-inner border border-red-500/20"><p class="text-lg font-black text-red-500">${a.wrong_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">Yanlış</p></div>
                                    <div class="text-center p-4 liquid-inner border border-slate-700"><p class="text-lg font-black text-slate-400">${a.empty_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">Boş</p></div>
                                </div>
                            </div>
                            <button onclick="alert('Detaylı PDF Raporu Hazırlanıyor...')" class="w-full py-5 bg-white/5 border border-white/10 text-white rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl">DETAYLI ANALİZİ İNDİR</button>
                        </div>
                    `).join('') || '<p class="opacity-30 italic text-center col-span-full">Veri bulunmuyor.</p>'}
                </div>`;
        }

        async function renderExams() {
            document.getElementById('page-title').innerText = 'Sınavlarım';
            const { data } = await supabaseClient.from('external_exams').select('*').eq('student_id', userProfile.id).order('scheduled_at', {ascending: true});
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">${(data||[]).map(e => `<div class="glass-card p-10 rounded-[3.5rem] h-80 flex flex-col justify-between"><div><h4 class="text-2xl font-black text-white italic uppercase mb-2">${e.title}</h4><p class="text-xs font-bold text-slate-500">${new Date(e.scheduled_at).toLocaleString('tr-TR')}</p></div><button onclick="showCode('${e.student_code}', '${e.link}')" class="w-full py-5 bg-orange-600 text-white rounded-3xl font-black text-xs uppercase shadow-xl">SINAVA GİRİŞ YAP</button></div>`).join('') || '<p class="opacity-30 italic">Sınav yok.</p>'}</div>`;
        }

        // YARDIMCI MODAL FONKSİYONLARI (ZIRHLI)
        window.openPdf = (u, t) => { document.getElementById('pdf-frame').src = u; document.getElementById('pdf-title').innerText = t; document.getElementById('pdf-modal').classList.remove('hidden'); document.getElementById('pdf-modal').classList.add('flex'); };
        window.closePdf = () => { document.getElementById('pdf-frame').src = ''; document.getElementById('pdf-modal').classList.add('hidden'); };
        window.openUpload = (id) => { document.getElementById('upload-hw-id').value = id; selectedFiles = []; updateFileUI(); document.getElementById('upload-modal').classList.remove('hidden'); document.getElementById('upload-modal').classList.add('flex'); };
        window.closeUpload = () => { document.getElementById('upload-modal').classList.add('hidden'); };
        window.handleFiles = (input) => { Array.from(input.files).forEach(f => selectedFiles.push(f)); updateFileUI(); input.value = ''; };
        window.updateFileUI = () => { document.getElementById('selected-files').innerHTML = selectedFiles.map((f, i) => `<div class="p-3 liquid-inner rounded-xl text-[10px] font-black uppercase flex justify-between items-center"><span>${f.name}</span><button onclick="selectedFiles.splice(${i},1);updateFileUI();" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join(''); };
        window.showCode = (c, l) => { document.getElementById('exam-code-display').innerText = c; document.getElementById('copy-exam-link-btn').onclick = () => { navigator.clipboard.writeText(c); window.open(l, '_blank'); document.getElementById('exam-code-modal').classList.add('hidden'); }; document.getElementById('exam-code-modal').classList.remove('hidden'); document.getElementById('exam-code-modal').classList.add('flex'); };
        
        window.submitSolution = async (e) => {
            e.preventDefault(); const btn = document.getElementById('upload-btn'); if(selectedFiles.length === 0) return alert("Dosya seçin!");
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";
            try {
                const urls = [];
                for(let f of selectedFiles) {
                    const fname = Date.now() + "_" + f.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase();
                    const { data, error } = await supabaseClient.storage.from('matota-files').upload('submissions/' + fname, f);
                    if(!error) { const { data: pUrl } = supabaseClient.storage.from('matota-files').getPublicUrl(data.path); urls.push(pUrl.publicUrl); }
                }
                const { error } = await supabaseClient.from('homework_submissions').insert([{ homework_id: document.getElementById('upload-hw-id').value, student_id: userProfile.id, file_urls: urls, note: document.getElementById('upload-note').value }]);
                if(!error) { alert("Başarıyla gönderildi!"); closeUpload(); navigate('s-homeworks'); } else throw error;
            } catch(err) { alert("Hata: " + err.message); btn.disabled = false; btn.innerText = "GÖNDERİMİ TAMAMLA"; }
        };

        window.onload = initAuth;
    </script>
</body>
</html>
