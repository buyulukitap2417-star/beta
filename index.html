<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Modern Öğrenci Yönetim Platformu v8.0</title>
    
    <!-- Merkezi Kütüphane Hub'ı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6', green: '#10b981', red: '#ef4444' } 
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'floating 3s ease-in-out infinite',
                        'glow': 'glowing 2s infinite alternate',
                    },
                    keyframes: {
                        floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        glowing: { '0%': { boxShadow: '0 0 5px rgba(37, 99, 235, 0.2)' }, '100%': { boxShadow: '0 0 20px rgba(37, 99, 235, 0.6)' } }
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        /* --- CORE ESTETİK --- */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; animation: moveOrb 25s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.2); } }

        /* --- MODERN CAM TASARIMI --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02) !important;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.7); }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 1rem; }

        /* --- SABİT LOGO & MENÜ VURGUSU --- */
        .logo-fixed { position: fixed; top: 24px; left: 32px; z-index: 2000; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4)); pointer-events: auto; }
        
        .sidebar-link { transition: all 0.3s ease; border-left: 0px solid transparent; }
        .sidebar-link.active { 
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.15) 0%, transparent 100%) !important;
            color: #3b82f6 !important;
            border-left: 4px solid #2563eb !important;
            padding-left: 1.75rem !important;
            box-shadow: inset 10px 0 20px -10px rgba(37, 99, 235, 0.2);
        }
        .sidebar-link.active i { color: #3b82f6 !important; }

        /* --- REELS LABORATUVARI --- */
        .reels-grid { height: calc(100vh - 180px); display: flex; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .reels-player { flex: 1.4; height: 100%; border-radius: 2.5rem; background: #000; position: relative; overflow: hidden; border: 4px solid rgba(255,255,255,0.05); }
        .reels-scroller { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-scroller::-webkit-scrollbar { display: none; }
        .reel-unit { height: 100%; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .reel-video-tag { width: 100%; height: 100%; object-fit: contain; }
        .reel-overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 20; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 45%); padding: 30px; display: flex; flex-direction: column; justify-content: flex-end; }
        .reel-actions-bar { position: absolute; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 40; pointer-events: auto; }
        .catalog-sidebar { flex: 0.8; height: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .catalog-card { cursor: pointer; transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.05); }
        .catalog-card.active { border-color: #2563eb; background: rgba(37, 99, 235, 0.1); transform: scale(1.02); }

        /* --- ANALİZ GRID SİSTEMİ --- */
        .optic-cell { width: 36px; height: 36px; border-radius: 10px; display: flex; items-center; justify-content: center; font-size: 10px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); }
        .res-correct { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .res-wrong { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; }
        .res-empty { background: rgba(255, 255, 255, 0.05); color: #94a3b8; }

        /* --- ERGONOMİK AYARLAR --- */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }
        .view-frame { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            .catalog-sidebar { display: none; }
            .reels-player { max-width: 100%; }
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row !important; z-index: 2001; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px !important; }
            .sidebar-link span { display: none; }
            .logo-fixed { top: 16px; left: 16px; }
            main { padding-bottom: 90px !important; }
        }
    </style>
</head>
<body class="dark overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- YÜKLEME EKRANI -->
    <div id="loading" class="fixed inset-0 z-[5000] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="h-16 w-16 border-2 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 animate-pulse">SİSTEM Terminali Başlatılıyor</p>
    </div>

    <!-- SABİT LOGO -->
    <div class="logo-fixed animate__animated animate__fadeInDown">
        <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 md:h-12 w-auto object-contain">
    </div>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[4000] bg-darkBg flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl text-center border border-white/10 animate__animated animate__zoomIn">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" class="h-14 mx-auto mb-8">
            <h3 class="text-xl font-black text-white italic uppercase tracking-tighter mb-8">Öğrenci Terminali</h3>
            <form id="login-form" class="space-y-4 text-left">
                <input type="email" id="login-email" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition font-bold text-sm" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition font-bold text-sm" placeholder="Şifre">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:brightness-110 transition tracking-widest mt-4 border border-white/10">Sisteme Gir</button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-[10px] font-bold hidden uppercase tracking-widest text-center"></div>
        </div>
    </div>

    <!-- ANA PANEL -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 glass-card border-r border-white/5 flex flex-col h-screen shrink-0 relative z-[1001] sidebar-fixed">
            <div class="h-32 hidden md:block"></div>
            <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-6 border-t border-white/5 hidden md:block">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black" id="user-avatar">?</div>
                    <div class="overflow-hidden"><p class="text-xs font-black truncate" id="user-name-display">...</p><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Öğrenci</p></div>
                </div>
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[10px] uppercase transition border border-red-500/10 tracking-widest">Çıkış Yap</button>
            </div>
        </aside>

        <!-- İçerik -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="main-scroll-area">
            <header class="p-6 md:px-12 md:pt-12 flex justify-between items-center h-28 shrink-0" id="main-header">
                <h1 class="text-3xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                <div class="flex items-center gap-4">
                    <div class="px-4 py-2 liquid-inner border border-white/10 rounded-xl font-black text-[10px] text-blue-400 hidden sm:block shadow-xl">
                        PUAN: <span id="header-score" class="text-white ml-1">0</span>
                    </div>
                    <button onclick="navigate('dashboard')" class="w-10 h-10 flex items-center justify-center glass-card rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="home"></i></button>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>
    </div>

    <!-- MODALLAR -->
    <div id="pdf-viewer-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl hidden items-center justify-center p-4 sm:p-10 z-[4000]">
        <div class="w-full max-w-6xl h-[90vh] glass-card rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden relative">
            <div class="p-4 border-b border-white/10 flex justify-between items-center liquid-inner">
                <h3 class="font-black text-white uppercase italic text-xs" id="pdf-title">Modern Belge Önizleme</h3>
                <button onclick="closePdfViewer()" class="w-10 h-10 liquid-inner rounded-full flex items-center justify-center text-white"><i data-lucide="x"></i></button>
            </div>
            <iframe id="pdf-iframe" src="" class="flex-1 w-full bg-slate-900 border-0"></iframe>
        </div>
    </div>

    <div id="hw-upload-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl hidden items-center justify-center p-6 z-[4000]">
        <div class="max-w-xl w-full glass-card p-10 rounded-[3.5rem] shadow-2xl border border-white/10 animate__animated animate__fadeInUp">
            <button onclick="closeUploadModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-black mb-1 italic uppercase text-white">Çözüm İlet</h3>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-8">Emeğini teknolojik bir veriye dönüştür</p>
            <form id="hw-upload-form" class="space-y-6">
                <input type="hidden" id="upload-hw-id">
                <div id="upload-file-list" class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-2"></div>
                <button type="button" onclick="document.getElementById('hw-file-input').click()" class="w-full p-10 border-2 border-dashed border-blue-500/30 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] hover:bg-blue-500/5 transition-all">
                    <i data-lucide="camera" class="w-10 h-10 mb-2 mx-auto block"></i>FOTOĞRAFLARI SEÇ
                </button>
                <input type="file" id="hw-file-input" class="hidden" multiple accept="image/*" onchange="window.handleHwFiles(this)">
                <textarea id="upload-note" placeholder="Mesajınız..." class="w-full p-5 rounded-2xl liquid-inner outline-none text-white h-32 border border-white/5"></textarea>
                <button type="submit" id="upload-submit-btn" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black uppercase shadow-lg">GÖNDERİMİ TAMAMLA</button>
            </form>
        </div>
    </div>

    <div id="analysis-detail-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-3xl hidden items-center justify-center p-4 z-[4000]">
        <div class="w-full max-w-7xl h-[90vh] glass-card rounded-[3.5rem] shadow-2xl flex flex-col overflow-hidden border border-white/10">
            <div class="p-8 border-b border-white/10 flex justify-between items-center liquid-inner">
                <h3 class="text-xl font-black text-white uppercase italic" id="analysis-title">Detaylı Rapor</h3>
                <button onclick="closeAnalysisModal()" class="w-12 h-12 liquid-inner rounded-full flex items-center justify-center text-white"><i data-lucide="x"></i></button>
            </div>
            <div id="analysis-content" class="flex-1 overflow-y-auto p-8 custom-scrollbar bg-black/20"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let userProfile = null, studentFiles = [], reelsObserver = null, isMuted = false;

        // AUTH & BOOTSTRAP
        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (data && data.role === 'student') {
                    userProfile = data;
                    document.getElementById('user-name-display').innerText = data.full_name;
                    document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                    document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                    document.getElementById('login-overlay').classList.add('hidden');
                    renderSidebar(); navigate(localStorage.getItem('lastView') || 'dashboard');
                } else { logout(); }
            } else { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('login-overlay').classList.add('flex'); }
            document.getElementById('loading').classList.add('opacity-0'); setTimeout(()=>document.getElementById('loading').remove(), 500);
        }

        async function handleLogin(e) {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "Doğrulanıyor...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error').innerText = "Hata: " + error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Sisteme Gir"; } 
            else { location.reload(); }
        }

        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }

        // NAVİGASYON
        function renderSidebar() {
            const items = [{id:'dashboard',n:'Dashboard',i:'home'},{id:'s-lessons',n:'Derslerim',i:'video'},{id:'s-exams',n:'Sınavlarım',i:'file-text'},{id:'s-homeworks',n:'Ödevlerim',i:'book-open'},{id:'s-files',n:'Dosyalarım',i:'folder'},{id:'s-videos',n:'Reels',i:'play-circle'},{id:'s-analytics',n:'Analizlerim',i:'pie-chart'}];
            document.getElementById('sidebar-nav').innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-5 px-8 py-5 rounded-[2rem] font-bold text-[10px] uppercase tracking-widest transition hover:bg-white/5"><i data-lucide="${x.i}" class="w-6 h-6"></i><span>${x.n}</span></button>`).join('');
            lucide.createIcons();
        }

        async function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const btn = document.getElementById('nav-'+v); if(btn) btn.classList.add('active');
            localStorage.setItem('lastView', v);
            const cont = document.getElementById('view-content');
            const header = document.getElementById('main-header');
            const scrollArea = document.getElementById('main-scroll-area');
            
            cont.innerHTML = '<div class="p-20 flex justify-center"><i class="fa-solid fa-atom fa-spin text-4xl text-blue-600"></i></div>';
            
            if(v === 's-videos') { header.classList.add('hidden'); scrollArea.classList.add('overflow-hidden'); scrollArea.classList.remove('overflow-y-auto'); cont.classList.remove('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.add('p-0', 'max-w-full'); }
            else { header.classList.remove('hidden'); scrollArea.classList.add('overflow-y-auto'); scrollArea.classList.remove('overflow-hidden'); cont.classList.add('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.remove('p-0', 'max-w-full'); if(reelsObserver) reelsObserver.disconnect(); }

            if(v === 'dashboard') await renderDashboard();
            else if(v === 's-lessons') await renderLessons();
            else if(v === 's-exams') await renderExams();
            else if(v === 's-homeworks') await renderHomeworks();
            else if(v === 's-files') await renderFiles();
            else if(v === 's-videos') await renderVideos();
            else if(v === 's-analytics') await renderAnalytics();
        }

        // MODÜL RENDERERS
        async function renderDashboard() {
            document.getElementById('page-title').innerText = 'Dashboard';
            const [ {data: p}, {data: next}, {data: hws}, {data: fls} ] = await Promise.all([
                supabaseClient.from('points').select('amount').eq('student_id', userProfile.id),
                supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).neq('is_completed', true).order('scheduled_at').limit(1).maybeSingle(),
                supabaseClient.from('homeworks').select('id').eq('student_id', userProfile.id).neq('is_completed', true).gte('deadline', new Date().toISOString()),
                supabaseClient.from('course_files').select('*').or(`student_id.is.null,student_id.eq.${userProfile.id}`).order('created_at', {ascending: false}).limit(1).maybeSingle()
            ]);
            const total = (p || []).reduce((a, b) => a + b.amount, 0);
            document.getElementById('header-score').innerText = total;

            document.getElementById('view-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-8 animate__animated animate__fadeInUp">
                    <div class="bg-blue-600 p-12 rounded-[4rem] text-white shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group">
                        <span class="text-[9px] uppercase font-black opacity-70 mb-2 tracking-[0.4em]">Başarı Skoru</span>
                        <h2 class="text-9xl font-black leading-none drop-shadow-2xl animate__animated animate__pulse animate__infinite">${total}</h2>
                        <i class="fa-solid fa-crown absolute -right-4 -bottom-4 text-9xl opacity-10 group-hover:rotate-12 transition-all"></i>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                        <div class="glass-card p-8 rounded-[3rem] border-l-4 border-l-orange-500">
                            <h4 class="text-[9px] font-black uppercase text-slate-500 mb-4 italic tracking-widest">Sıradaki Oturum</h4>
                            ${next ? `<div><h3 class="text-xl font-black uppercase text-white mb-1 drop-shadow-md">${next.title}</h3><p class="text-[10px] font-bold text-orange-500 uppercase">${new Date(next.scheduled_at).toLocaleString('tr-TR')}</p></div>` : '<p class="opacity-40 italic font-bold text-xs uppercase">Ders yok.</p>'}
                        </div>
                        <div class="glass-card p-8 rounded-[3rem] border-l-4 border-l-blue-500 flex flex-col justify-center text-center">
                            <h4 class="text-[9px] font-black uppercase text-slate-500 mb-4 italic tracking-widest">Aktif Ödev</h4>
                            <p class="text-white font-black text-5xl italic drop-shadow-lg">${hws?.length || 0}</p>
                        </div>
                        <div class="glass-card p-8 rounded-[3rem] border-l-4 border-l-purple-500 md:col-span-2 flex items-center justify-between">
                            <div><h4 class="text-[9px] font-black uppercase text-slate-500 mb-4 italic tracking-widest">Son Eklenen Dosya</h4>
                            ${fls ? `<div class="flex items-center gap-3"><div class="w-10 h-10 liquid-inner flex items-center justify-center text-red-500 text-xl rounded-xl border border-white/5 shadow-inner"><i class="fa-solid fa-file-pdf"></i></div><p class="font-bold text-white uppercase text-xs">${fls.title}</p></div>` : '<p class="opacity-40 italic font-black text-xs uppercase">Dosya yok.</p>'}</div>
                            <button onclick="navigate('s-files')" class="px-6 py-3 bg-white/5 rounded-2xl font-black text-[9px] uppercase tracking-widest hover:bg-white/10 transition-all border border-white/10 shadow-lg">Kütüphaneye Git</button>
                        </div>
                    </div>
                </div>`;
        }

        async function renderLessons() {
            document.getElementById('page-title').innerText = 'Ders Programı';
            const { data } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).order('scheduled_at', {ascending: true});
            const now = new Date();
            const active = (data||[]).filter(l => !l.is_completed && new Date(l.scheduled_at) > new Date(now.getTime() - 120 * 60000));
            const past = (data||[]).filter(l => l.is_completed || new Date(l.scheduled_at) <= new Date(now.getTime() - 120 * 60000));

            const card = (l, isPast) => `
                <div class="glass-card p-10 rounded-[4rem] h-[450px] flex flex-col justify-between group relative overflow-hidden transition-all duration-700 ${isPast ? 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100' : ''}">
                    <div class="absolute -top-10 -right-10 w-48 h-48 bg-blue-600/5 rounded-full group-hover:scale-125 transition-all"></div>
                    <div>

                const urls = [];
                for(let f of studentFiles) {
                    const fn = `submissions/${userProfile.id}/${Date.now()}_${f.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase()}`;
                    const { data, error } = await supabaseClient.storage.from('matota-files').upload(fn, f);
                    if(!error) { const { data: pUrl } = supabaseClient.storage.from('matota-files').getPublicUrl(data.path); urls.push(pUrl.publicUrl); }
                }
                const { error } = await supabaseClient.from('homework_submissions').insert([{ homework_id: document.getElementById('upload-hw-id').value, student_id: userProfile.id, file_urls: urls, note: document.getElementById('upload-note').value }]);
                if(!error) { alert("Çözüm rasyonel bir şekilde mühürlendi!"); closeUploadModal(); navigate('s-homeworks'); } else throw error;
            } catch(err) { alert("Hata: " + err.message); btn.disabled = false; btn.innerText = "TEKRAR DENE"; }
        };

        window.onload = initAuth;
    </script>
</body>
</html>
