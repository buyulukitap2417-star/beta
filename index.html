<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Modern Öğrenci Yönetim Platformu</title>
    
    <!-- Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6' } 
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: moveOrb 20s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* ÖZEL İMLEÇ */
        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%232563eb" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, .cursor-pointer { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        /* LİKİT CAM TASARIMI */
        .glass-card {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(37, 99, 235, 0.4) !important; }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }

        /* SABİT LOGO */
        .logo-fixed { position: fixed; top: 32px; left: 32px; z-index: 1000; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.3)); }

        /* REELS MOTORU */
        .reels-wrapper { height: calc(100vh - 100px); width: 100%; max-width: 420px; margin: 0 auto; border-radius: 3rem; overflow: hidden; background: #000; border: 4px solid rgba(255,255,255,0.05); }
        .reels-container { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item { height: 100%; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .reel-video { width: 100%; height: 100%; object-fit: contain; }
        .reel-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .reel-actions { position: absolute; right: 15px; bottom: 80px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }

        .view-fade { animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .logo-fixed { top: 16px; left: 16px; }
            .logo-fixed img { height: 32px; }
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row !important; border-right: 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; background: #020617; }
            .sidebar-link span { display: none; }
            main { padding-bottom: 90px !important; }
        }
    </style>
</head>
<body class="dark overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- LOADER -->
    <div id="loading" class="fixed inset-0 z-[2000] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="h-16 w-16 border-4 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 animate-pulse">SİSTEM BAĞLANTISI KURULUYOR</p>
    </div>

    <!-- SABİT LOGO -->
    <div class="logo-fixed animate__animated animate__fadeInDown">
        <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 md:h-14 w-auto object-contain">
    </div>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[1500] bg-darkBg flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-md w-full glass-card p-12 rounded-[3.5rem] shadow-2xl text-center border border-white/10 animate__animated animate__zoomIn">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" class="h-16 mx-auto mb-10 drop-shadow-xl">
            <h3 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-8">Öğrenci Girişi</h3>
            <form onsubmit="window.handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 focus:border-blue-500 transition" placeholder="Şifre">
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black uppercase shadow-lg hover:brightness-110 transition tracking-widest mt-4">Portala Bağlan</button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-xs font-bold hidden"></div>
        </div>
    </div>

    <!-- ANA PLATFORM -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 glass-card border-r border-white/5 flex flex-col h-screen shrink-0 sidebar-fixed">
            <div class="p-10 text-center h-32 hidden md:flex items-center justify-center"></div>
            <nav class="flex-1 px-4 py-4 space-y-2 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-6 border-t border-white/5 hidden md:block">
                <div class="flex items-center gap-3 mb-6 px-2">
                    <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black" id="user-avatar">?</div>
                    <div class="overflow-hidden"><p class="text-xs font-black truncate" id="user-name-display">...</p><p class="text-[9px] font-bold text-slate-500 uppercase">Modern Öğrenci</p></div>
                </div>
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[10px] uppercase transition border border-red-500/10">Oturumu Kapat</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="main-scroll-area">
            <header class="p-6 md:px-12 md:pt-16 flex justify-between items-center h-32 shrink-0" id="main-header">
                <h1 class="text-3xl md:text-5xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                <div class="flex items-center gap-4">
                    <div class="px-6 py-3 liquid-inner border border-white/10 rounded-2xl font-black text-xs text-blue-400 shadow-xl hidden lg:block">
                        SKOR: <span id="header-score" class="text-white ml-2">0</span>
                    </div>
                    <button onclick="navigate('dashboard')" class="w-12 h-12 flex items-center justify-center glass-card rounded-xl"><i class="fa-solid fa-house"></i></button>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>
    </div>

    <!-- MODALLAR (ANALİZ, PDF, ÖDEV) -->
    <div id="pdf-viewer-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl hidden items-center justify-center p-4 z-[3000]">
        <div class="w-full max-w-6xl h-[90vh] glass-card rounded-[3rem] shadow-2xl flex flex-col overflow-hidden">
            <div class="p-5 border-b border-white/10 flex justify-between items-center liquid-inner">
                <h3 class="font-black text-white uppercase italic text-sm" id="pdf-title">Belge Önizleme</h3>
                <button onclick="closePdfViewer()" class="w-10 h-10 liquid-inner rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <iframe id="pdf-iframe" src="" class="flex-1 w-full bg-slate-900 border-0"></iframe>
        </div>
    </div>

    <div id="analysis-detail-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl hidden items-center justify-center p-4 z-[3000]">
        <div class="w-full max-w-7xl h-[90vh] glass-card rounded-[4rem] shadow-2xl flex flex-col overflow-hidden border border-white/10">
            <div class="p-8 border-b border-white/10 flex justify-between items-center liquid-inner">
                <h3 class="text-2xl font-black text-white uppercase italic" id="analysis-title">Analiz Raporu</h3>
                <button onclick="closeAnalysisModal()" class="w-12 h-12 liquid-inner rounded-full flex items-center justify-center text-white hover:bg-white/10 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="analysis-content" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div>
        </div>
    </div>

    <div id="homework-upload-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl hidden items-center justify-center p-6 z-[3000]">
        <div class="max-w-xl w-full glass-card p-10 rounded-[4rem] shadow-2xl border border-white/10 animate__animated animate__fadeInUp">
            <button onclick="closeUploadModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 class="text-2xl font-black mb-2 italic uppercase text-white">Çözüm Yükle</h3>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-8">Emeğini sisteme bilimsel bir titizlikle mühürle</p>
            <form onsubmit="window.submitHomework(event)" class="space-y-6">
                <input type="hidden" id="upload-hw-id">
                <div id="upload-file-list" class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar"></div>
                <button type="button" onclick="document.getElementById('hw-file-input').click()" class="w-full p-10 border-2 border-dashed border-blue-500/30 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] hover:bg-white/5 transition-all">
                    <i class="fa-solid fa-camera text-3xl mb-3 block"></i>ÇÖZÜM FOTOĞRAFLARI EKLE
                </button>
                <input type="file" id="hw-file-input" class="hidden" multiple accept="image/*" onchange="window.handleHwFiles(this)">
                <textarea id="upload-note" placeholder="Ali Hocam, bu ödevde takıldığım yerler..." class="w-full p-5 rounded-2xl liquid-inner outline-none text-white h-32 border border-white/5 focus:border-blue-500 transition"></textarea>
                <button type="submit" id="upload-submit-btn" class="w-full bg-blue-600 text-white py-5 rounded-[2.5rem] font-black uppercase shadow-lg hover:brightness-110 transition">GÖNDERİMİ TAMAMLA</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let userProfile = null, studentFiles = [], reelsObserver = null;

        // AUTH & BOOTSTRAP
        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (data && data.role === 'student') {
                    userProfile = data;
                    document.getElementById('user-name-display').innerText = data.full_name;
                    document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                    document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                    document.getElementById('login-overlay').classList.add('hidden');
                    renderSidebar(); navigate(localStorage.getItem('lastView') || 'dashboard');
                } else { logout(); }
            } else { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('login-overlay').classList.add('flex'); }
            document.getElementById('loading').classList.add('opacity-0'); setTimeout(()=>document.getElementById('loading').remove(), 500);
        }

        async function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('login-btn'); btn.disabled = true; btn.innerText = "Doğrulanıyor...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error').innerText = "Giriş Hatası: " + error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Portala Bağlan"; } 
            else { location.reload(); }
        }

        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }

        // NAVİGASYON
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const items = [
                {id:'dashboard',n:'Dashboard',i:'fa-chart-line'},
                {id:'s-lessons',n:'Derslerim',i:'fa-video'},
                {id:'s-exams',n:'Sınavlarım',i:'fa-file-signature'},
                {id:'s-homeworks',n:'Ödevlerim',i:'fa-book-open-reader'},
                {id:'s-files',n:'Dosyalarım',i:'fa-folder-open'},
                {id:'s-videos',n:'Kısa Videolar',i:'fa-play-circle'},
                {id:'s-analytics',n:'Analizlerim',i:'fa-chart-pie'}
            ];
            nav.innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-5 px-8 py-5 rounded-[2rem] font-bold text-[11px] uppercase tracking-widest transition hover:bg-white/5"><i class="fa-solid ${x.i} text-xl w-8 text-center"></i><span>${x.n}</span></button>`).join('');
        }

        async function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const btn = document.getElementById('nav-'+v); if(btn) btn.classList.add('active');
            localStorage.setItem('lastView', v);
            const cont = document.getElementById('view-content');
            const header = document.getElementById('main-header');
            const scrollArea = document.getElementById('main-scroll-area');
            
            cont.innerHTML = '<div class="p-32 flex justify-center items-center flex-col animate__animated animate__fadeIn"><i class="fa-solid fa-atom fa-spin text-6xl text-blue-600 mb-6"></i><p class="font-black uppercase tracking-[0.4em] text-[10px] opacity-40">Veri İşleniyor</p></div>';
            
            if(v === 's-videos') { header.classList.add('hidden'); scrollArea.classList.remove('overflow-y-auto'); scrollArea.classList.add('overflow-hidden'); cont.classList.remove('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.add('p-0', 'max-w-full'); }
            else { header.classList.remove('hidden'); scrollArea.classList.add('overflow-y-auto'); scrollArea.classList.remove('overflow-hidden'); cont.classList.add('px-6', 'md:px-12', 'max-w-7xl'); cont.classList.remove('p-0', 'max-w-full'); if(reelsObserver) reelsObserver.disconnect(); }

            if(v === 'dashboard') await renderDashboard();
            else if(v === 's-lessons') await renderLessons();
            else if(v === 's-exams') await renderExams();
            else if(v === 's-homeworks') await renderHomeworks();
            else if(v === 's-files') await renderFiles();
            else if(v === 's-videos') await renderVideos();
            else if(v === 's-analytics') await renderAnalytics();
        }

        // MODÜL: DASHBOARD
        async function renderDashboard() {
            document.getElementById('page-title').innerText = 'Dashboard';
            const { data: p } = await supabaseClient.from('points').select('amount').eq('student_id', userProfile.id);
            const total = (p || []).reduce((a, b) => a + b.amount, 0);
            document.getElementById('header-score').innerText = total;

            const { data: next } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).neq('is_completed', true).order('scheduled_at').limit(1).maybeSingle();
            const { data: homeworks } = await supabaseClient.from('homeworks').select('*').eq('student_id', userProfile.id).neq('is_completed', true);

            document.getElementById('view-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-10">
                    <div class="bg-blue-600 p-16 rounded-[4rem] text-white shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group">
                        <span class="text-xs uppercase font-black opacity-70 mb-4 tracking-[0.4em]">Akademik Başarı Puanın</span>
                        <h2 class="text-[12rem] font-black leading-none drop-shadow-2xl animate__animated animate__pulse animate__infinite">${total}</h2>
                        <i class="fa-solid fa-crown absolute -right-4 -bottom-4 text-[12rem] opacity-10 group-hover:rotate-12 transition-all"></i>
                    </div>
                    <div class="space-y-6">
                        <div class="glass-card p-10 rounded-[3rem] border-l-4 border-l-orange-500 h-1/2 flex flex-col justify-center">
                            <h4 class="text-xs font-black uppercase text-slate-500 mb-6 italic tracking-widest">Sıradaki Bilimsel Oturum</h4>
                            ${next ? `<div><h3 class="text-3xl font-black uppercase italic text-white mb-2 leading-tight">${next.title}</h3><p class="text-sm font-bold text-orange-500 uppercase tracking-widest">${new Date(next.scheduled_at).toLocaleString('tr-TR')}</p></div>` : '<p class="opacity-40 italic font-bold">Planlı ders bulunmuyor.</p>'}
                        </div>
                        <div class="glass-card p-10 rounded-[3rem] border-l-4 border-l-blue-500 h-1/2 flex items-center justify-between">
                            <div><h4 class="text-xs font-black uppercase text-slate-500 mb-4 italic tracking-widest">Aktif Görevler</h4><p class="text-white font-black text-4xl italic">${homeworks?.length || 0} Bekleyen Ödev</p></div>
                            <i class="fa-solid fa-bolt text-5xl text-blue-500 opacity-20 animate-pulse"></i>
                        </div>
                    </div>
                </div>`;
        }

        // MODÜL: DERSLER (ARŞİVLEMELİ)
        async function renderLessons() {
            document.getElementById('page-title').innerText = 'Ders Programı';
            const { data } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).order('scheduled_at', {ascending: true});
            const active = (data||[]).filter(l => !l.is_completed);
            const past = (data||[]).filter(l => l.is_completed);

            document.getElementById('view-content').innerHTML = `
                <div class="space-y-16">
                    <div>
                        <h3 class="text-[10px] font-black uppercase text-blue-500 mb-8 italic tracking-[0.4em] flex items-center gap-4"><span class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span> Aktif Oturumlar</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${active.map(l => `
                                <div class="glass-card p-10 rounded-[3.5rem] h-96 flex flex-col justify-between group">
                                    <div class="w-14 h-14 rounded-2xl liquid-inner flex items-center justify-center text-blue-500 text-2xl border border-blue-500/20 shadow-inner group-hover:scale-110 transition"><i class="fa-solid fa-video"></i></div>
                                    <div><h4 class="text-3xl font-black text-white italic uppercase mb-2 leading-tight">${l.title}</h4><p class="text-xs font-bold text-slate-500 uppercase tracking-widest">${new Date(l.scheduled_at).toLocaleString('tr-TR')}</p></div>
                                    <a href="${l.link}" target="_blank" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-center shadow-xl tracking-widest hover:brightness-110 transition-all uppercase text-xs">OTURUMA KATIL</a>
                                </div>
                            `).join('') || '<div class="col-span-full py-20 text-center opacity-30 font-black italic tracking-widest border-2 border-dashed border-white/5 rounded-3xl uppercase">Aktif oturum bulunmuyor.</div>'}
                        </div>
                    </div>
                    <div class="pt-16 border-t border-white/5">
                        <h3 class="text-[10px] font-black uppercase text-slate-500 mb-8 italic tracking-[0.4em] opacity-50"><i class="fa-solid fa-archive mr-2"></i> Geçmiş Oturumlar</h3>
                        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8 opacity-60">
                            ${past.map(l => `<div class="glass-card p-8 rounded-[2.5rem] grayscale h-48 flex flex-col justify-between"><div><h4 class="font-black text-white uppercase italic text-sm mb-1">${l.title}</h4><p class="text-[9px] font-bold text-slate-500">${new Date(l.scheduled_at).toLocaleDateString('tr-TR')}</p></div><span class="text-[8px] font-black text-green-500 uppercase tracking-widest border border-green-500/20 px-3 py-1 rounded-full w-fit">TAMAMLANDI</span></div>`).join('') || '<p class="opacity-30 italic font-bold uppercase text-[10px]">Arşiv boş.</p>'}
                        </div>
                    </div>
                </div>`;
        }

        // MODÜL: ÖDEVLER (KİLİTLEMELİ VE YÜKLEMELİ)
        async function renderHomeworks() {
            document.getElementById('page-title').innerText = 'Ödev Takibi';
            const { data: hws } = await supabaseClient.from('homeworks').select('*').eq('student_id', userProfile.id).order('deadline', {ascending: true});
            const { data: subs } = await supabaseClient.from('homework_submissions').select('homework_id').eq('student_id', userProfile.id);
            const subSet = new Set((subs||[]).map(s => s.homework_id));

            const active = (hws||[]).filter(h => !h.is_completed && new Date(h.deadline) > new Date());
            const past = (hws||[]).filter(h => h.is_completed || new Date(h.deadline) <= new Date());

            const hwCard = (h, isPast) => {
                const sent = subSet.has(h.id);
                const isLocked = isPast || h.is_completed;
                return `
                    <div class="glass-card p-10 rounded-[3.5rem] h-[500px] flex flex-col justify-between group relative overflow-hidden ${isLocked && !sent ? 'opacity-50 grayscale' : ''}">
                        <div>
                            <div class="flex justify-between items-start mb-10">
                                <div class="w-14 h-14 rounded-2xl liquid-inner flex items-center justify-center text-orange-500 text-2xl border border-orange-500/20 shadow-inner"><i class="fa-solid fa-file-signature"></i></div>
                                ${sent ? '<span class="px-4 py-2 bg-green-500 text-white rounded-full text-[8px] font-black uppercase shadow-lg">GÖNDERİLDİ</span>' : (isLocked ? '<span class="px-4 py-2 bg-slate-700 text-white rounded-full text-[8px] font-black uppercase shadow-lg">SÜRE DOLDU</span>' : '<span class="px-4 py-2 bg-orange-600 text-white rounded-full text-[8px] font-black uppercase shadow-lg animate-pulse">BEKLİYOR</span>')}
                            </div>
                            <h4 class="text-2xl font-black text-white uppercase italic tracking-tighter mb-4 leading-tight">${h.title}</h4>
                            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest italic"><i class="fa-regular fa-clock mr-1 text-orange-500"></i> ${new Date(h.deadline).toLocaleString('tr-TR')}</p>
                        </div>
                        <div class="space-y-4">
                            <button onclick="window.openPdfViewer('${h.pdf_url}', '${h.title.replace(/'/g,"\\'")}')" class="w-full py-4 border border-blue-500/30 text-blue-400 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">ÖDEV PDF'İNİ AÇ</button>
                            ${sent ? 
                                `<div class="p-4 liquid-inner text-center text-green-500 font-black text-[9px] uppercase tracking-[0.3em] border border-green-500/20"><i class="fa-solid fa-check-double mr-2"></i>KAYIT MÜHÜRLENDİ</div>` : 
                                (isLocked ? 
                                    `<div class="p-4 liquid-inner text-center text-slate-500 font-black text-[9px] uppercase tracking-[0.3em] border border-white/5"><i class="fa-solid fa-lock mr-2"></i>ERİŞİM KAPALI</div>` : 
                                    `<button onclick="window.openUploadModal('${h.id}')" class="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black uppercase text-[11px] tracking-[0.2em] shadow-xl hover:brightness-110 transition-all">ÇÖZÜMÜ YÜKLE</button>`
                                )
                            }
                        </div>
                    </div>`;
            };

            document.getElementById('view-content').innerHTML = `
                <div class="space-y-16">
                    <div>
                        <h3 class="text-[10px] font-black uppercase text-blue-500 mb-8 italic tracking-[0.4em]"><i class="fa-solid fa-hourglass-start mr-2"></i> Bekleyen Modern Görevler</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                            ${active.map(h => hwCard(h, false)).join('') || '<p class="opacity-30 italic font-black uppercase text-xs">Bekleyen ödeviniz yok.</p>'}
                        </div>
                    </div>
                    <div class="pt-16 border-t border-white/5">
                        <h3 class="text-[10px] font-black uppercase text-slate-500 mb-8 italic tracking-[0.4em] opacity-50"><i class="fa-solid fa-archive mr-2"></i> Tamamlanan / Süresi Geçenler</h3>
                        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8">
                            ${past.map(h => hwCard(h, true)).join('') || '<p class="opacity-30 italic font-black uppercase text-xs">Arşivlenmiş ödev yok.</p>'}
                        </div>
                    </div>
                </div>`;
        }

        // MODÜL: REELS (SNAP-SCROLL)
        async function renderVideos() {
            document.getElementById('page-title').innerText = 'Kısa Videolar';
            const { data: vids } = await supabaseClient.from('videos').select('*').order('created_at', {ascending: false});
            if(!vids || vids.length === 0) { document.getElementById('view-content').innerHTML = '<div class="h-full flex items-center justify-center p-20 glass-card rounded-[4rem] text-center italic font-black text-slate-600 uppercase">Video yüklenmemiş.</div>'; return; }

            document.getElementById('view-content').innerHTML = `
                <div class="flex h-full w-full justify-center items-center p-4 lg:p-10">
                    <div class="reels-wrapper">
                        <div class="reels-container" id="reels-engine">
                            ${vids.map(v => `
                                <div class="reel-item">
                                    <video src="${v.video_url}" loop playsinline class="reel-video cursor-pointer" onclick="this.paused ? this.play() : this.pause()"></video>
                                    <div class="reel-overlay">
                                        <div class="mb-4 flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white">A</div><span class="text-xs font-black text-white drop-shadow-md tracking-widest">Ali Şengül</span></div>
                                        <h4 class="text-sm font-bold text-white leading-relaxed drop-shadow-lg pr-12">${v.title}</h4>
                                    </div>
                                    <div class="reel-actions">
                                        <button class="flex flex-col items-center gap-1"><div class="w-14 h-14 rounded-full glass-card flex items-center justify-center text-white text-xl hover:text-red-500 transition-all"><i class="fa-solid fa-heart"></i></div><span class="text-[8px] font-black uppercase text-white shadow-lg">BEĞEN</span></button>
                                        <button onclick="window.openVideoComments('${v.id}')" class="flex flex-col items-center gap-1"><div class="w-14 h-14 rounded-full glass-card flex items-center justify-center text-white text-xl hover:text-blue-400 transition-all"><i class="fa-solid fa-comment"></i></div><span class="text-[8px] font-black uppercase text-white shadow-lg">YORUM</span></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;

            const engine = document.getElementById('reels-engine');
            const videos = engine.querySelectorAll('video');
            reelsObserver = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) { e.target.play(); } else { e.target.pause(); e.target.currentTime = 0; } });
            }, { threshold: 0.8 });
            videos.forEach(v => reelsObserver.observe(v));
        }

        // MODÜL: ANALİZLER (DETAYLI RAPOR)
        async function renderAnalytics() {
            document.getElementById('page-title').innerText = 'Analiz Merkezi';
            const { data } = await supabaseClient.from('detailed_analyses').select('*').eq('student_id', userProfile.id).order('created_at', {ascending: false});
            
            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                    ${(data||[]).map(a => `
                        <div class="glass-card p-10 rounded-[3.5rem] h-[520px] flex flex-col justify-between group relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/5 rounded-full group-hover:scale-150 transition-all duration-1000"></div>
                            <div>
                                <div class="flex justify-between items-center mb-8">
                                    <span class="px-4 py-1 liquid-inner border border-white/10 rounded-lg text-[9px] font-black uppercase text-blue-400">${a.type === 'exam' ? 'Sınav' : 'Ödev'}</span>
                                    <h2 class="text-4xl font-black text-white drop-shadow-md">%${Math.round((a.correct_count/a.total_questions)*100)}</h2>
                                </div>
                                <h4 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-6 leading-tight">${a.title}</h4>
                                <div class="grid grid-cols-3 gap-4 mb-8">
                                    <div class="text-center p-4 liquid-inner border border-green-500/20"><p class="text-xl font-black text-green-500">${a.correct_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">D</p></div>
                                    <div class="text-center p-4 liquid-inner border border-red-500/20"><p class="text-xl font-black text-red-500">${a.wrong_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">Y</p></div>
                                    <div class="text-center p-4 liquid-inner border border-slate-700"><p class="text-xl font-black text-slate-400">${a.empty_count}</p><p class="text-[8px] font-bold text-slate-500 uppercase">B</p></div>
                                </div>
                            </div>
                            <button onclick="window.showGroupedAnalysisModal('${a.task_id}', '${userProfile.id}')" class="w-full py-5 bg-white/5 border border-white/10 text-white rounded-[2rem] font-black text-[10px] uppercase tracking-[0.3em] hover:bg-blue-600 transition-all shadow-xl">DETAYLI ANALİZİ GÖR</button>
                        </div>
                    `).join('') || '<p class="opacity-30 italic text-center col-span-full font-black uppercase tracking-widest py-20">Analiz kaydı bulunmuyor.</p>'}
                </div>`;
        }

        // MODÜL: DOSYALAR
        async function renderFiles() {
            document.getElementById('page-title').innerText = 'Ders Arşivi';
            const { data } = await supabaseClient.from('course_files').select('*').or(`student_id.is.null,student_id.eq.${userProfile.id}`).order('created_at', {ascending: false});
            
            document.getElementById('view-content').innerHTML = `
                <div class="max-w-4xl mx-auto space-y-6">
                    ${(data||[]).map(f => `
                        <div class="glass-card p-8 rounded-[2.5rem] flex items-center justify-between group transition-all duration-500 hover:bg-white/5">
                            <div class="flex items-center gap-6 text-left">
                                <div class="w-16 h-16 liquid-inner text-red-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-white/10 group-hover:scale-110 transition-transform"><i class="fa-solid fa-file-pdf"></i></div>
                                <div><h5 class="font-black text-white text-lg uppercase tracking-tighter leading-tight mb-1">${f.title}</h5><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest italic">${new Date(f.created_at).toLocaleDateString('tr-TR')} • Bilimsel Döküman</p></div>
                            </div>
                            <button onclick="window.openPdfViewer('${f.file_url}', '${f.title.replace(/'/g,"\\'")}')" class="px-10 py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl transition-all hover:brightness-110">GÖRÜNTÜLE</button>
                        </div>
                    `).join('') || '<p class="text-center opacity-30 italic font-black uppercase tracking-widest py-20">Dosya bulunmuyor.</p>'}
                </div>`;
        }

        // ÖDEV YÜKLEME YARDIMCILARI
        window.openUploadModal = (id) => { document.getElementById('upload-hw-id').value = id; studentFiles = []; updateFileListUI(); document.getElementById('homework-upload-modal').classList.remove('hidden'); document.getElementById('homework-upload-modal').classList.add('flex'); };
        window.closeUploadModal = () => { document.getElementById('homework-upload-modal').classList.add('hidden'); };
        window.handleHwFiles = (input) => { Array.from(input.files).forEach(f => studentFiles.push(f)); updateFileListUI(); input.value = ''; };
        window.updateFileListUI = () => { document.getElementById('upload-file-list').innerHTML = studentFiles.map((f, i) => `<div class="p-4 liquid-inner rounded-2xl text-[10px] font-black uppercase flex justify-between items-center border border-white/5"><span><i class="fa-solid fa-image text-blue-500 mr-2"></i>${f.name}</span><button type="button" onclick="studentFiles.splice(${i},1);updateFileListUI();" class="text-red-500 hover:scale-125 transition-transform"><i class="fa-solid fa-trash-can"></i></button></div>`).join(''); };
        
        window.submitHomework = async (e) => {
            e.preventDefault(); const btn = document.getElementById('upload-submit-btn'); if(studentFiles.length === 0) return alert("Lütfen en az bir fotoğraf seçin!");
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";
            try {
                const urls = [];
                for(let f of studentFiles) {
                    const fname = Date.now() + "_" + f.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase();
                    const { data, error } = await supabaseClient.storage.from('matota-files').upload('submissions/' + fname, f);
                    if(!error) { const { data: pUrl } = supabaseClient.storage.from('matota-files').getPublicUrl(data.path); urls.push(pUrl.publicUrl); }
                }
                const { error } = await supabaseClient.from('homework_submissions').insert([{ homework_id: document.getElementById('upload-hw-id').value, student_id: userProfile.id, file_urls: urls, note: document.getElementById('upload-note').value }]);
                if(!error) { alert("Çözüm rasyonel bir şekilde sisteme iletildi!"); closeUploadModal(); navigate('s-homeworks'); } else throw error;
            } catch(err) { alert("Hata: " + err.message); btn.disabled = false; btn.innerText = "GÖNDERİMİ TAMAMLA"; }
        };

        // ANALİZ DETAY YARDIMCILARI
        window.closeAnalysisModal = () => { document.getElementById('analysis-detail-modal').classList.add('hidden'); };
        window.closePdfViewer = () => { document.getElementById('pdf-iframe').src = ''; document.getElementById('pdf-viewer-modal').classList.add('hidden'); };

        window.onload = initAuth;
    </script>
</body>
</html>
