<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Eğitmen Portalı</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', brand: { blue: '#2563eb', orange: '#ea580c' } } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; scroll-behavior: smooth; background: linear-gradient(135deg, #fffedd, #fef3c7, #ffedd5); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #1e293b; overflow-x: hidden; }
        .dark body { background: linear-gradient(135deg, #1f0d05, #0f172a, #2a110a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #f8fafc; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.3; animation: moveOrb 20s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 40vw; height: 40vw; background: #ea580c; top: -10%; left: -10%; } .orb-2 { width: 35vw; height: 35vw; background: #3b82f6; bottom: -10%; right: -10%; animation-delay: -5s; } .orb-3 { width: 30vw; height: 30vw; background: #f59e0b; top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        .dark .ambient-orb { opacity: 0.15; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, input, select, textarea, .cursor-pointer, [onclick] { cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%233b82f6" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        .liquid-card { background: rgba(255, 255, 255, 0.35) !important; backdrop-filter: blur(24px) saturate(180%) !important; border: 1px solid rgba(255, 255, 255, 0.5) !important; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 0 0 1px rgba(255, 255, 255, 0.4) !important; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease !important; }
        .dark .liquid-card { background: rgba(15, 23, 42, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.03) !important; }
        .liquid-card:hover { transform: translateY(-4px); box-shadow: 0 15px 45px 0 rgba(234, 88, 12, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.6) !important; }
        .dark .liquid-card:hover { box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.1) !important; }
        
        .liquid-card-inner { background: rgba(255, 255, 255, 0.4) !important; backdrop-filter: blur(12px) !important; border: 1px solid rgba(255, 255, 255, 0.6) !important; }
        .dark .liquid-card-inner { background: rgba(0, 0, 0, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.06) !important; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.2) !important; backdrop-filter: blur(30px) saturate(200%) !important; border-right: 1px solid rgba(255, 255, 255, 0.4) !important; }
        .dark .glass-sidebar { background: rgba(15, 23, 42, 0.4) !important; border-right: 1px solid rgba(255, 255, 255, 0.05) !important; }

        .animate-float-up { animation: floatUp 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(10px) scale(0.9); } 20% { opacity: 1; transform: translateY(0) scale(1); } 80% { opacity: 1; transform: translateY(-20px) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(1.1); } }

        .brand-bg { background-color: #ea580c; } .brand-text { color: #ea580c; }
        .sidebar-link.active { color: #ffffff !important; background-color: rgba(234, 88, 12, 0.9) !important; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2) !important; box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.4) !important; }
        .sidebar-link.active i, .sidebar-link.active span { color: #ffffff !important; }
        
        .view-fade { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .filterable-item { transition: opacity 0.3s ease; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(234, 88, 12, 0.5); border-radius: 10px; } .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(234, 88, 12, 0.5); }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 overflow-x-hidden" id="main-body">
    
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div><div class="ambient-orb orb-3"></div>

    <div id="loading" class="fixed inset-0 z-[100] bg-white/80 dark:bg-darkBg/80 backdrop-blur-xl flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="h-12 w-12 rounded-full border-4 border-slate-200 dark:border-slate-800 border-t-orange-600 animate-spin drop-shadow-md"></div>
        <p class="mt-4 text-xs font-black uppercase tracking-widest text-orange-600 drop-shadow-sm">EĞİTMEN SİSTEMİ BAŞLATILIYOR...</p>
    </div>

    <!-- GİRİŞ (LOGIN) EKRANI -->
    <div id="login-overlay" class="min-h-screen flex items-center justify-center p-4 relative z-50">
        <div class="max-w-md w-full liquid-card p-10 rounded-[3rem] shadow-2xl relative view-fade text-center border border-white/20">
            <div class="text-center mb-8">
                <span class="px-4 py-1.5 liquid-card-inner text-orange-600 dark:text-orange-400 rounded-full text-[10px] font-black uppercase mb-4 inline-block italic tracking-widest shadow-sm border border-orange-500/20">YÖNETİCİ PORTALI</span>
                <h2 class="text-4xl font-black text-slate-800 dark:text-white drop-shadow-sm tracking-tighter">MATOTA<span class="text-orange-500">Admin</span></h2>
                <p class="text-xs font-bold text-slate-500 mt-2">Sadece eğitmenler giriş yapabilir.</p>
            </div>
            <form id="login-form" class="space-y-4" onsubmit="window.handleLogin(event)">
                <input type="email" id="login-email" required class="w-full px-6 py-4 rounded-2xl liquid-card-inner outline-none focus:ring-2 focus:ring-orange-500 transition font-medium text-slate-800 dark:text-white placeholder-slate-500" placeholder="Yönetici E-postası">
                <input type="password" id="login-password" required class="w-full px-6 py-4 rounded-2xl liquid-card-inner outline-none focus:ring-2 focus:ring-orange-500 transition font-medium text-slate-800 dark:text-white placeholder-slate-500" placeholder="Şifre">
                <button type="submit" id="login-btn" class="w-full brand-bg text-white py-4 rounded-2xl font-black uppercase shadow-lg transition hover:brightness-110 border border-white/20 mt-2">Sisteme Gir</button>
            </form>
            <div id="login-error-container" class="mt-4 p-3 bg-red-500/10 backdrop-blur-md rounded-xl hidden text-red-600 dark:text-red-400 border border-red-500/20 text-xs font-bold text-center"></div>
        </div>
    </div>

    <!-- ANA PLATFORM -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        
        <aside class="w-full md:w-72 glass-sidebar flex flex-col sticky top-0 h-screen z-50 overflow-hidden text-slate-600 dark:text-slate-400 shrink-0">
            <div class="p-8 text-center cursor-pointer transition hover:scale-105 flex justify-center items-center h-32" onclick="navigate('dashboard')">
                <img src="" alt="MATOTA Logo" id="sidebar-logo" class="h-12 w-auto object-contain drop-shadow-md">
            </div>
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-6 border-t border-slate-300/50 dark:border-slate-700/50">
                <div class="flex items-center space-x-3 mb-6 px-2">
                    <div class="w-12 h-12 rounded-2xl brand-bg text-white flex items-center justify-center font-black text-xl shadow-lg border border-white/20" id="user-avatar">A</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-black dark:text-white truncate drop-shadow-sm" id="user-name">...</p>
                        <p class="text-[9px] font-bold uppercase tracking-[0.15em] text-slate-500">YÖNETİCİ</p>
                    </div>
                </div>
                <button type="button" onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[11px] uppercase tracking-widest transition hover:scale-105">
                    <i class="fa-solid fa-power-off mr-1"></i> Çıkış Yap
                </button>
            </div>
        </aside>
        
        <main class="flex-1 bg-transparent h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="app-main-area">
            <header class="mb-8 flex justify-between items-center p-6 md:px-12 md:pt-12 shrink-0" id="main-header">
                <div><h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tight drop-shadow-sm" id="page-title">...</h1></div>
                <div class="flex items-center gap-3">
                    <button type="button" onclick="toggleViewMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl liquid-card transition hover:scale-105 text-slate-600 dark:text-slate-300" title="Görünümü Değiştir"><i class="fa-solid fa-table-cells-large" id="view-mode-icon"></i></button>
                    <button type="button" onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl liquid-card transition hover:scale-105 text-slate-600 dark:text-slate-300"><i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:block text-white"></i></button>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>
    </div>

    <!-- MODALLAR -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-4" style="z-index: 99999;">
        <div class="max-w-sm w-full liquid-card p-8 rounded-[2.5rem] shadow-2xl text-center border border-white/20"><div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl border border-red-500/20 shadow-inner"><i class="fa-solid fa-circle-question"></i></div><p id="modal-text" class="font-black text-lg text-slate-800 dark:text-white mb-8 italic drop-shadow-sm"></p><div class="flex gap-3"><button type="button" onclick="hideCustomModal()" class="flex-1 py-4 liquid-card-inner rounded-2xl font-bold uppercase text-xs text-slate-800 dark:text-white hover:brightness-110 transition">İptal</button><button type="button" id="modal-confirm-btn" class="flex-1 py-4 bg-red-600 border border-white/20 text-white rounded-2xl font-black uppercase text-xs shadow-lg hover:brightness-110 transition">Onayla</button></div></div>
    </div>

    <div id="analysis-detail-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-4" style="z-index: 999999;">
        <div class="max-w-[95vw] lg:max-w-7xl w-full liquid-card p-8 md:p-12 rounded-[3rem] shadow-2xl relative view-fade max-h-[90vh] overflow-y-auto custom-scrollbar flex-col border border-white/20"><div id="analysis-detail-content" class="w-full"></div></div>
    </div>

    <div id="pdf-viewer-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden items-center justify-center p-4 sm:p-10" style="z-index: 999999;">
        <div class="w-full max-w-6xl h-[90vh] liquid-card rounded-[2rem] shadow-2xl relative flex flex-col overflow-hidden view-fade border border-white/20"><div class="p-4 sm:p-6 border-b border-slate-300/50 dark:border-slate-700/50 flex justify-between items-center liquid-card-inner shrink-0"><h3 class="text-sm sm:text-lg font-black italic uppercase text-slate-800 dark:text-white truncate pr-4 drop-shadow-sm" id="pdf-viewer-title"><i class="fa-solid fa-file-pdf text-red-500 mr-2 drop-shadow"></i>Dosya Görüntüleyici</h3><button type="button" onclick="closePdfViewer()" class="w-10 h-10 liquid-card-inner rounded-full flex items-center justify-center text-slate-500 hover:text-slate-800 dark:hover:text-white transition shadow-sm"><i class="fa-solid fa-xmark text-lg"></i></button></div><div class="flex-1 w-full bg-slate-200 dark:bg-slate-800/80 relative"><div id="pdf-loading" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 dark:text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-blue-500"></i><p class="font-bold uppercase text-[10px] tracking-widest drop-shadow-sm">Dosya Yükleniyor...</p></div><iframe id="pdf-iframe" src="" class="w-full h-full border-0 relative z-10" onload="document.getElementById('pdf-loading').style.display='none'"></iframe></div></div>
    </div>

    <div id="game-viewer-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl hidden items-center justify-center p-4 sm:p-10" style="z-index: 999999;">
        <div class="w-full max-w-6xl h-[90vh] liquid-card rounded-[2rem] shadow-2xl relative flex flex-col overflow-hidden view-fade border border-white/20"><div class="p-4 sm:p-6 border-b border-slate-300/50 dark:border-slate-700/50 flex justify-between items-center liquid-card-inner shrink-0"><h3 class="text-sm sm:text-lg font-black italic uppercase text-slate-800 dark:text-white truncate pr-4 drop-shadow-sm" id="game-viewer-title"><i class="fa-solid fa-gamepad text-orange-500 mr-2 drop-shadow"></i>Oyun İnceleme</h3><button type="button" onclick="closeGameViewer()" class="w-10 h-10 liquid-card-inner rounded-full flex items-center justify-center text-slate-500 hover:text-slate-800 dark:hover:text-white transition shadow-sm"><i class="fa-solid fa-xmark text-lg"></i></button></div><div class="flex-1 w-full bg-white dark:bg-darkCard relative overflow-hidden"><iframe id="game-iframe" srcdoc="" class="w-full h-full border-0" sandbox="allow-scripts allow-same-origin"></iframe></div></div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null, userProfile = null, editingLessonId = null, editingGameId = null;
        let currentViewMode = localStorage.getItem('viewMode') || 'grid'; 
        let heartbeatInterval = null;

        const globalTopics = ['Çarpanlar ve Katlar', 'Üslü İfadeler', 'Kareköklü İfadeler', 'Veri Analizi', 'Basit Olayların Olma Olasılığı', 'Cebirsel İfadeler ve Özdeşlikler', 'Doğrusal Denklemler', 'Eşitsizlikler', 'Üçgenler', 'Eşlik ve Benzerlik', 'Dönüşüm Geometrisi', 'Geometrik Cisimler'];

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); const msg = document.createElement('div'); msg.innerHTML = '<i class="fa-solid fa-shield-halved mr-1"></i> Sağ tık koruması'; msg.className = "fixed z-[999999] liquid-card border border-white/20 text-slate-800 dark:text-white text-[10px] font-black px-4 py-2 rounded-full pointer-events-none animate-float-up shadow-xl"; msg.style.left = e.clientX + 15 + 'px'; msg.style.top = e.clientY + 15 + 'px'; document.body.appendChild(msg); setTimeout(() => msg.remove(), 1500); });
        
        window.toggleViewMode = function() { currentViewMode = currentViewMode === 'grid' ? 'list' : 'grid'; localStorage.setItem('viewMode', currentViewMode); updateViewModeIcon(); const lastView = localStorage.getItem('lastView'); if(lastView) navigate(lastView); };
        function updateViewModeIcon() { const icon = document.getElementById('view-mode-icon'); if (icon) { icon.className = currentViewMode === 'grid' ? 'fa-solid fa-list' : 'fa-solid fa-table-cells-large'; } }
        
        window.applyFilters = function(cId, sId, stId, dId) { 
            const container = document.getElementById(cId); 
            if (!container) return; 
            const search = document.getElementById(sId)?.value.toLowerCase() || ''; 
            const student = document.getElementById(stId)?.value || ''; 
            const date = document.getElementById(dId)?.value || ''; 
            const items = container.querySelectorAll('.filterable-item'); 
            
            items.forEach(item => { 
                const textStr = (item.dataset.search || '').toLowerCase(); 
                const stuId = item.dataset.student || ''; 
                const itemDate = item.dataset.date || ''; 
                let match = true; 
                
                if (search && !textStr.includes(search)) match = false; 
                if (student && stuId !== student && stuId !== 'null') match = false; 
                if (date && !itemDate.startsWith(date)) match = false; 
                
                item.style.display = match ? '' : 'none'; 
            }); 
        }

        function updateLogos() { 
            const isDark = document.documentElement.classList.contains('dark'); 
            const url = SUPABASE_URL + "/storage/v1/object/public/logos/" + (isDark ? "acik.png" : "koyu.png"); 
            const sl = document.getElementById('sidebar-logo'); 
            if(sl) sl.src = url; 
        }

        function updateTheme(role) { 
            const body = document.getElementById('main-body'); 
            if (body) { 
                body.classList.remove('theme-blue', 'theme-orange'); 
                body.classList.add(role === 'teacher' ? 'theme-orange' : 'theme-blue'); 
            } 
            updateLogos(); 
        }

        function toggleDarkMode() { 
            document.documentElement.classList.toggle('dark'); 
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; 
            updateLogos(); 
        }

        function hideLoading() { const l = document.getElementById('loading'); if(l) { l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 500); } }
        
        function showLanding() { 
            const loginOverlay = document.getElementById('login-overlay');
            if (loginOverlay) {
                loginOverlay.classList.remove('hidden');
                loginOverlay.classList.add('flex');
            }
            const appMain = document.getElementById('app');
            if (appMain) {
                appMain.classList.add('hidden');
                appMain.classList.remove('flex');
            }
            updateLogos(); 
        }

        function hideAuthScreen() { const m = document.getElementById('login-overlay'); if (m) { m.classList.add('hidden'); m.classList.remove('flex'); } }
        
        function logout() { 
            if(heartbeatInterval) clearInterval(heartbeatInterval);
            localStorage.clear(); 
            supabaseClient.auth.signOut().then(() => {
                location.reload(); 
            });
        }

        function sanitizeFileName(str) { return str.replace(/[^a-z0-9.]/gi, '_').toLowerCase(); }

        async function uploadFile(file, folder) { if(!file) return ""; const fileName = Date.now() + "_" + sanitizeFileName(file.name); const { data, error } = await supabaseClient.storage.from('matota-files').upload(folder + '/' + fileName, file); if (error) throw error; const { data: { publicUrl } } = supabaseClient.storage.from('matota-files').getPublicUrl(data.path); return publicUrl; }

        window.hideCustomModal = function() { const m = document.getElementById('custom-modal'); if(m) { m.style.display = 'none'; m.classList.add('hidden'); m.classList.remove('flex'); } };
        window.closeAnalysisModal = function() { const m = document.getElementById('analysis-detail-modal'); if(m) { m.style.display = 'none'; m.classList.add('hidden'); m.classList.remove('flex'); } };
        window.closePdfViewer = function() { const iframe = document.getElementById('pdf-iframe'); if (iframe) iframe.src = ''; const m = document.getElementById('pdf-viewer-modal'); if(m) { m.style.display = 'none'; m.classList.add('hidden'); m.classList.remove('flex'); } };
        window.openPdfViewer = function(url, title) { document.getElementById('pdf-viewer-title').innerHTML = `<i class="fa-solid fa-file-pdf text-red-500 mr-2 drop-shadow"></i> ${title}`; document.getElementById('pdf-loading').style.display = 'flex'; document.getElementById('pdf-iframe').src = url; const m = document.getElementById('pdf-viewer-modal'); m.style.display = 'flex'; m.classList.remove('hidden'); m.classList.add('flex'); };
        window.closeGameViewer = function() { const iframe = document.getElementById('game-iframe'); if (iframe) iframe.srcdoc = ''; const m = document.getElementById('game-viewer-modal'); if(m) { m.style.display = 'none'; m.classList.add('hidden'); m.classList.remove('flex'); } };
        window.openGameViewer = function(title, code) { document.getElementById('game-viewer-title').innerHTML = `<i class="fa-solid fa-gamepad text-orange-500 mr-2 drop-shadow"></i> ${title}`; document.getElementById('game-iframe').srcdoc = code; const m = document.getElementById('game-viewer-modal'); m.style.display = 'flex'; m.classList.remove('hidden'); m.classList.add('flex'); };
        
        window.showGroupedAnalysisModal = async function(taskId, studentId) {
            if (!taskId || taskId === 'null' || taskId === 'undefined') return alert("Geçerli bir ID bulunamadı.");
            const modal = document.getElementById('analysis-detail-modal'); const contentDiv = document.getElementById('analysis-detail-content');
            modal.style.display = 'flex'; modal.classList.remove('hidden'); modal.classList.add('flex'); contentDiv.innerHTML = '<div class="p-20 flex justify-center"><div class="animate-spin h-10 w-10 border-4 border-white/50 border-t-orange-500 rounded-full"></div></div>';
            try {
                const { data: analyses, error } = await supabaseClient.from('detailed_analyses').select('*').eq('task_id', taskId).eq('student_id', studentId).order('created_at', { ascending: true });
                if(error) throw error;
                if(!analyses || analyses.length === 0) { contentDiv.innerHTML = `<div class="text-center p-10"><h3 class="text-2xl font-black mb-4 text-slate-800 dark:text-white drop-shadow-sm">Henüz Analiz Yok</h3><p class="text-slate-500 mb-8 font-medium">Bu görev için analiz girilmemiş.</p><button type="button" onclick="window.closeAnalysisModal()" class="px-8 py-4 bg-orange-600 text-white rounded-xl font-black transition hover:scale-105 shadow-lg border border-white/20">Kapat</button></div>`; return; }
                let baseTitle = analyses[0].title ? analyses[0].title.toString() : 'Analiz Raporu'; if(baseTitle.includes('-')) baseTitle = baseTitle.split('-')[0].trim();
                let html = `<button type="button" onclick="window.closeAnalysisModal()" class="absolute top-8 right-8 text-slate-500 hover:text-slate-800 dark:hover:text-white transition z-50 drop-shadow-md"><i class="fa-solid fa-xmark text-3xl"></i></button><h3 class="text-3xl font-black mb-8 italic uppercase tracking-tighter text-slate-800 dark:text-white border-b border-white/20 dark:border-slate-700/50 pb-4 pr-12 drop-shadow-sm">${baseTitle} - Detaylı Rapor</h3><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">`;
                analyses.forEach((a) => {

        window.saveDetailedAnalysis = async function() { 
            const sid = document.getElementById('an-student').value; 
            const type = document.getElementById('an-type').value; 
            const taskId = document.getElementById('an-task').value; 
            const title = document.getElementById('an-title').value; 
            const count = parseInt(document.getElementById('an-qcount').value); 
            
            let correctCount = 0, wrongCount = 0, emptyCount = 0; 
            let topicAnalysis = {}; let questionDetails = []; 
            
            for(let i=1; i<=count; i++) { 
                const topic = document.getElementById(`topic-${i}`).value; 
                const corr = document.getElementById(`corr-${i}`).value; 
                const stud = document.getElementById(`stud-${i}`).value; 
                
                if(!topicAnalysis[topic]) topicAnalysis[topic] = { total: 0, correct: 0, wrong: 0, empty: 0 }; 
                topicAnalysis[topic].total++; 
                
                if(stud === '-') { emptyCount++; topicAnalysis[topic].empty++; } 
                else if(stud === corr) { correctCount++; topicAnalysis[topic].correct++; } 
                else { wrongCount++; topicAnalysis[topic].wrong++; } 
                
                questionDetails.push({ no: i, topic: topic, correct: corr, student: stud }); 
            } 
            
            const payload = { 
                student_id: sid, 
                task_id: taskId, 
                title: title, 
                type: type, 
                total_questions: count, 
                correct_count: correctCount, 
                wrong_count: wrongCount, 
                empty_count: emptyCount, 
                topic_analysis: topicAnalysis, 
                question_details: questionDetails 
            }; 
            
            const { error } = await supabaseClient.from('detailed_analyses').insert([payload]); 
            if(error) { 
                alert("Hata: " + error.message); 
            } else { 
                const addedPoints = Math.round((correctCount / count) * 10); 
                await supabaseClient.from('points').insert([{ student_id: sid, category: type === 'exam' ? 'Sınav Uygulama' : 'Ödev Yapma', amount: addedPoints }]); 
                alert(`Analiz işlendi! Öğrenciye ${addedPoints} puan eklendi.`); 
                window.renderTeacherAnalytics(); 
            } 
        }

                if (analysesToDelete) {

            } 
        }

        window.loadStudentProgress = async function() {
            const sid = document.getElementById('prog-student').value; 
            const startDate = document.getElementById('prog-date-start').value; 
            const endDate = document.getElementById('prog-date-end').value; 
            if(!sid) return alert("Öğrenci seçiniz.");
            
            let analyses = []; 
            const r = await supabaseClient.from('detailed_analyses').select('*').eq('student_id', sid); 
            if(!r.error) analyses = r.data;
            
            if(!analyses || analyses.length === 0) { 
                document.getElementById('progress-content').innerHTML = `<div class="liquid-card p-10 rounded-[3rem] text-center italic text-slate-500 font-bold uppercase text-xs">Veri bulunmuyor.</div>`; 
                return; 
            }
            
            let filteredAnalyses = analyses; 
            if (startDate) filteredAnalyses = filteredAnalyses.filter(a => new Date(a.created_at) >= new Date(startDate)); 
            if (endDate) filteredAnalyses = filteredAnalyses.filter(a => new Date(a.created_at) <= new Date(endDate + 'T23:59:59'));
            if(filteredAnalyses.length === 0) { 
                document.getElementById('progress-content').innerHTML = `<div class="liquid-card p-10 rounded-[3rem] text-center italic text-slate-500 font-bold uppercase text-xs">Seçilen tarihlerde veri yok.</div>`; 
                return; 
            }
            
            let tQ = 0, tC = 0, tW = 0, tE = 0; let tStats = {};
            filteredAnalyses.forEach(a => { 
                tQ += a.total_questions || 0; tC += a.correct_count || 0; tW += a.wrong_count || 0; tE += a.empty_count || 0; 
                if(a.topic_analysis) { 
                    Object.keys(a.topic_analysis).forEach(t => { 
                        if(!tStats[t]) tStats[t] = { c: 0, total: 0 }; 
                        tStats[t].c += a.topic_analysis[t].correct || 0; 
                        tStats[t].total += a.topic_analysis[t].total || 0; 
                    }); 
                } 
            });
            
            const genSuccess = Math.round((tC / tQ) * 100) || 0;
            
            let topicsHtml = Object.keys(tStats).length > 0 ? Object.keys(tStats).map(t => { 
                const s = tStats[t]; 
                const rate = Math.round((s.c / s.total) * 100) || 0; 
                const color = rate >= 70 ? 'bg-green-500' : (rate >= 40 ? 'bg-orange-500' : 'bg-red-500'); 
                const textColor = rate >= 70 ? 'text-green-600 dark:text-green-400' : (rate >= 40 ? 'text-orange-500' : 'text-red-500'); 
                return `
                    <div class="mb-4">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                            <span>${t}</span>
                            <span class="${textColor} drop-shadow-sm">%${rate} BAŞARI (${s.c}/${s.total})</span>
                        </div>
                        <div class="w-full liquid-card-inner rounded-full h-3 shadow-inner overflow-hidden border border-white/10">
                            <div class="h-3 rounded-full ${color}" style="width: ${rate}%"></div>
                        </div>
                    </div>`; 
            }).join('') : '<p class="text-xs italic text-slate-500">Konu detayı yok.</p>';
            
            document.getElementById('progress-content').innerHTML = `
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-orange-600 text-white p-8 rounded-[2.5rem] shadow-2xl text-center flex flex-col justify-center border border-white/20">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-2 drop-shadow-sm">Genel Başarı</p>
                        <p class="text-6xl font-black drop-shadow-lg">%${genSuccess}</p>
                    </div>
                    <div class="liquid-card p-8 rounded-[2.5rem] shadow-lg text-center flex flex-col justify-center">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 drop-shadow-sm">Toplam Soru</p>
                        <p class="text-4xl font-black text-slate-800 dark:text-white drop-shadow-md">${tQ}</p>
                    </div>
                    <div class="liquid-card p-8 rounded-[2.5rem] shadow-lg flex justify-around items-center text-center">
                        <div><p class="text-3xl font-black text-green-500 drop-shadow-md">${tC}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Doğru</p></div>
                        <div><p class="text-3xl font-black text-red-500 drop-shadow-md">${tW}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Yanlış</p></div>
                        <div><p class="text-3xl font-black text-slate-500 drop-shadow-md">${tE}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Boş</p></div>
                    </div>
                </div>
                <div class="liquid-card p-10 rounded-[3rem] shadow-xl">
                    <h4 class="font-black text-lg mb-6 italic text-slate-800 dark:text-white drop-shadow-sm">Konu Bazlı Kümülatif Analiz</h4>
                    ${topicsHtml}
                </div>`;
        }

                            <h4 class="font-black text-lg mb-4 italic uppercase tracking-tighter text-slate-800 dark:text-white drop-shadow-sm">Yeni Öğrenci Ekle</h4>
                            <input type="text" id="s-name" placeholder="Ad Soyad" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-orange-500">
                            <input type="email" id="s-email" placeholder="E-posta" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-orange-500">
                            <input type="password" id="s-pass" placeholder="Şifre" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-orange-500">
                            <button type="submit" class="w-full bg-orange-600 border border-white/20 text-white py-4 rounded-xl font-black uppercase shadow-lg transition hover:brightness-110 mt-2">Öğrenciyi Kaydet</button>
                        </form>
                        <div class="liquid-card rounded-[3rem] shadow-xl overflow-hidden flex flex-col h-fit max-h-[70vh]">
                            <div class="p-6 border-b border-white/10 shrink-0">
                                <h4 class="font-black text-[10px] uppercase text-slate-500 tracking-widest drop-shadow-sm">Kayıtlı Öğrenciler</h4>
                            </div>
                            <div class="flex-1 overflow-y-auto custom-scrollbar p-2">
                                ${htmlList}
                            </div>
                        </div>
                    </div>`; 
                
                document.getElementById('add-student-form').onsubmit = async (e) => { 
                    e.preventDefault(); 
                    const btn = e.target.querySelector('button[type="submit"]');
                    btn.disabled = true; btn.innerText = "EKLENİYOR...";
                    
                    const { error } = await supabaseClient.auth.signUp({ 
                        email: document.getElementById('s-email').value, 
                        password: document.getElementById('s-pass').value, 
                        options: { data: { full_name: document.getElementById('s-name').value, role: 'student' } } 
                    }); 
                    
                    if(!error) { alert("Öğrenci Kaydedildi!"); window.renderTeacherStudents(); } 
                    else { alert("Hata: " + error.message); btn.disabled = false; btn.innerText = "Öğrenciyi Kaydet"; }
                }; 
            } catch(err) { console.error(err); }
        }

        // ==========================================
        // İNİSYALİZASYON
        // ==========================================
        window.onload = initAuth;
    </script>
</body>
</html>
