<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Öğrenci Portalı</title>
    
    <!-- Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c' } 
                    } 
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: moveOrb 20s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 40vw; height: 40vw; background: #ea580c; top: -5%; left: -5%; }
        .orb-2 { width: 35vw; height: 35vw; background: #3b82f6; bottom: -5%; right: -5%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%232563eb" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, .cursor-pointer { cursor: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(37, 99, 235, 0.3) !important; }
        
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }

        .sidebar-link.active { color: #ffffff !important; background-color: rgba(37, 99, 235, 0.9) !important; backdrop-filter: blur(10px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }

        /* REELS MOTORU */
        .reels-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100%; border-radius: 2rem; background: #000; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item { scroll-snap-align: start; height: 100%; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-player-layer { width: 100%; height: 100%; object-fit: contain; }

        .view-fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="bg-darkBg overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- YÜKLEME EKRANI -->
    <div id="loading" class="fixed inset-0 z-[100] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="h-10 w-10 border-2 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-black uppercase tracking-[0.3em] text-blue-500">Öğrenci Sistemi Başlatılıyor</p>
    </div>

    <!-- LANDING PAGE -->
    <div id="landing-page" class="hidden min-h-screen flex flex-col relative z-10 bg-darkBg">
        <nav class="h-24 flex items-center px-8 justify-between border-b border-white/5">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 w-auto">
            <button onclick="showAuthScreen()" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:scale-105 transition">Giriş Yap</button>
        </nav>
        <section class="flex-1 flex flex-col justify-center items-center text-center px-6">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-8 italic">Eğitimde <span class="text-blue-600">Teknoloji.</span></h1>
            <p class="text-xl text-slate-400 max-w-2xl mb-12 font-medium">Ali Şengül eğitim ekosistemiyle başarıyı tesadüfe bırakma.</p>
            <button onclick="showAuthScreen()" class="px-12 py-5 bg-blue-600 text-white rounded-[2rem] font-black text-lg shadow-2xl transition hover:scale-105">Portala Giriş Yap</button>
        </section>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-overlay" class="fixed inset-0 z-[60] bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-4">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl relative text-center border border-white/10 animate__animated animate__zoomIn">
            <button onclick="hideAuthScreen()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="mb-10 text-center">
                <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-16 w-auto object-contain mx-auto mb-6">
                <span class="px-5 py-2 liquid-inner text-blue-500 rounded-full text-xs font-black uppercase tracking-widest border border-blue-500/20">Öğrenci Girişi</span>
            </div>
            <form id="login-form" class="space-y-4" onsubmit="window.handleLogin(event)">
                <input type="email" id="login-email" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white placeholder-slate-500 font-medium" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white placeholder-slate-500 font-medium" placeholder="Şifre">
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg transition hover:brightness-110 mt-4 border border-white/10">Sisteme Bağlan</button>
            </form>
            <div id="login-error-container" class="mt-4 p-3 bg-red-500/10 rounded-xl hidden text-red-500 text-xs font-bold border border-red-500/20 text-center uppercase tracking-widest"></div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 glass-card border-r border-white/5 flex flex-col h-screen shrink-0">
            <div class="p-8 text-center border-b border-white/5">
                <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 w-auto mx-auto mb-2 drop-shadow-md">
                <p class="text-[9px] font-black tracking-[0.4em] text-blue-500 uppercase italic">Öğrenci Portalı</p>
            </div>
            <nav class="flex-1 px-4 py-8 space-y-3 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-6 border-t border-white/5 flex flex-col gap-3">
                <div class="flex items-center gap-3 px-2 mb-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-xs text-white" id="user-avatar">?</div>
                    <p class="text-[10px] font-black uppercase text-slate-400 truncate" id="user-name-display">...</p>
                </div>
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[10px] uppercase transition border border-red-500/10">Oturumu Kapat</button>
            </div>
        </aside>

        <!-- İçerik Alanı -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="app-main-area">
            <header class="p-6 md:px-12 md:pt-12 flex justify-between items-center" id="main-header">
                <h1 class="text-4xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                <div class="flex gap-2">
                    <button onclick="navigate('s-videos')" class="w-12 h-12 flex items-center justify-center rounded-2xl glass-card text-blue-400"><i class="fa-solid fa-play"></i></button>
                    <button onclick="navigate('dashboard')" class="w-12 h-12 flex items-center justify-center rounded-2xl glass-card text-white"><i class="fa-solid fa-house"></i></button>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>
    </div>

    <!-- MODALLAR -->
    <div id="pdf-viewer-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden items-center justify-center p-4 z-[999999]"><div class="w-full max-w-6xl h-[90vh] glass-card rounded-[2rem] shadow-2xl relative flex flex-col overflow-hidden"><div class="p-4 border-b border-white/10 flex justify-between items-center liquid-inner shrink-0"><h3 class="font-black text-white truncate" id="pdf-viewer-title">PDF</h3><button onclick="closePdfViewer()" class="w-10 h-10 liquid-inner rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-xmark"></i></button></div><iframe id="pdf-iframe" src="" class="flex-1 w-full border-0 bg-slate-900"></iframe></div></div>
    <div id="game-viewer-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl hidden items-center justify-center p-4 z-[999999]"><div class="w-full max-w-6xl h-[90vh] glass-card rounded-[2rem] shadow-2xl relative flex flex-col overflow-hidden"><div class="p-4 border-b border-white/10 flex justify-between items-center liquid-inner shrink-0"><h3 class="font-black text-white" id="game-viewer-title">Oyun Odası</h3><button onclick="closeGameViewer()" class="w-10 h-10 liquid-inner rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-xmark"></i></button></div><iframe id="game-iframe" srcdoc="" class="flex-1 w-full border-0 bg-white" sandbox="allow-scripts allow-same-origin"></iframe></div></div>
    <div id="submit-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-6 z-[999999]"><div class="max-w-lg w-full glass-card p-10 rounded-[4rem] shadow-2xl relative flex flex-col border border-white/10"><button onclick="closeSubmitOverlay()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></button><h3 class="text-2xl font-black mb-8 italic uppercase text-white">Çözüm Gönder</h3><form id="hw-submit-form" class="space-y-6 overflow-y-auto flex-1 custom-scrollbar"><input type="hidden" id="submit-hw-id"><div id="file-list-container" class="space-y-2 mb-4"></div><button type="button" onclick="document.getElementById('file-input-multi').click()" class="w-full p-8 border-2 border-dashed border-blue-400 rounded-[2.5rem] text-blue-500 font-black uppercase liquid-inner hover:bg-white/5 transition">Fotoğraf Ekle</button><input type="file" id="file-input-multi" class="hidden" multiple onchange="window.addFilesToSubmission(this)"><textarea id="submit-note" placeholder="Eğitmene notun..." class="w-full p-5 rounded-2xl liquid-inner outline-none text-white h-32 border border-white/5 focus:border-blue-500 transition"></textarea><button type="button" onclick="window.submitHomeworkData()" id="submit-btn-final" class="w-full bg-blue-600 text-white py-5 rounded-[2.5rem] font-black uppercase shadow-lg border border-white/10">Bitir ve Gönder</button></form></div></div>
    <div id="analysis-detail-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-4 z-[999999]"><div class="max-w-7xl w-full glass-card p-12 rounded-[3rem] shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar border border-white/10"><div id="analysis-detail-content" class="w-full"></div></div></div>
    <div id="exam-code-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xl hidden items-center justify-center p-4 z-[999999]"><div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl text-center border border-white/10"><div class="w-16 h-16 bg-blue-500/10 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl"><i class="fa-solid fa-key"></i></div><h3 class="text-xl font-black mb-4 text-white uppercase italic">Sınav Giriş Kodu</h3><div class="liquid-inner p-6 rounded-2xl mb-8 border border-white/10 shadow-inner"><span id="exam-code-display" class="text-4xl font-mono font-black tracking-[0.3em] text-blue-500"></span></div><button id="copy-exam-link-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg hover:scale-105 transition">Kodu Kopyala & Git</button></div></div>

    <script>
        // SUPABASE CONFIG
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let userProfile = null, studentSelectedFiles = [], reelsObserver = null;

        // AUTH & CORE UI
        function hideLoading() { const l = document.getElementById('loading'); if(l) { l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 500); } }
        function showLanding() { document.getElementById('landing-page').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
        function showAuthScreen() { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('login-overlay').classList.add('flex'); }
        function hideAuthScreen() { document.getElementById('login-overlay').classList.add('hidden'); }
        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }
        
        async function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('login-btn'); btn.disabled = true; btn.innerText = "Bağlanıyor...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error-container').innerText = error.message; document.getElementById('login-error-container').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Sisteme Bağlan"; } else { location.reload(); }
        }

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (data && data.role === 'student') {
                    userProfile = data; 
                    document.getElementById('user-name-display').innerText = data.full_name;
                    document.getElementById('user-avatar').innerText = data.full_name[0];
                    document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                    renderSidebar(); navigate(localStorage.getItem('lastView') || 'dashboard');
                    window.startHeartbeat();
                } else { logout(); }
            } else { showLanding(); }
            hideLoading();
        }

        window.startHeartbeat = () => {
            const update = async () => { if(userProfile) await supabaseClient.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', userProfile.id); };
            update(); setInterval(update, 60000);
        };

        // NAVİGASYON
        function renderSidebar() {
            const items = [{id:'dashboard',n:'Dashboard',i:'fa-house'},{id:'s-lessons',n:'Derslerim',i:'fa-video'},{id:'s-exams',n:'Sınavlarım',i:'fa-file-signature'},{id:'s-homeworks',n:'Ödevlerim',i:'fa-book-open'},{id:'s-files',n:'Dosyalar',i:'fa-folder-open'},{id:'s-games',n:'Oyun Odası',i:'fa-gamepad'},{id:'s-videos',n:'Kısa Videolar',i:'fa-play'},{id:'s-analytics',n:'Analizlerim',i:'fa-chart-pie'}];
            document.getElementById('sidebar-nav').innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase transition hover:bg-white/10"><i class="fa-solid ${x.i} text-lg w-6"></i><span>${x.n}</span></button>`).join('');
        }

        async function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const btn = document.getElementById('nav-'+v); if(btn) btn.classList.add('active');
            localStorage.setItem('lastView', v);
            const cont = document.getElementById('view-content');
            const mainHeader = document.getElementById('main-header');
            
            cont.innerHTML = '<div class="p-20 flex justify-center"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>';
            if(v === 's-videos') mainHeader.classList.add('hidden'); else mainHeader.classList.remove('hidden');

            if(v === 'dashboard') await renderDashboard();
            else if(v === 's-lessons') await renderLessons();
            else if(v === 's-exams') await renderExams();
            else if(v === 's-homeworks') await renderHomeworks();
            else if(v === 's-files') await renderFiles();
            else if(v === 's-games') await renderGames();
            else if(v === 's-videos') await renderVideos();
            else if(v === 's-analytics') await renderAnalytics();
        }

        // --- MODÜL RENDERERS ---

        async function renderDashboard() {
            document.getElementById('page-title').innerText = 'Dashboard';
            const { data: points } = await supabaseClient.from('points').select('amount').eq('student_id', userProfile.id);
            const total = (points || []).reduce((a, b) => a + b.amount, 0);
            
            const { data: lessons } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).neq('is_completed', true).limit(2);
            const { data: hws } = await supabaseClient.from('homeworks').select('*').eq('student_id', userProfile.id).neq('is_completed', true).limit(2);

            document.getElementById('view-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-10 view-fade">
                    <div class="bg-blue-600 p-12 rounded-[4rem] text-white shadow-2xl flex flex-col justify-center items-center italic font-black relative overflow-hidden">
                        <span class="text-sm uppercase opacity-80 mb-2">Toplam Başarı Puanın</span>
                        <span class="text-9xl drop-shadow-xl">${total}</span>
                        <i class="fa-solid fa-crown absolute -right-8 -bottom-8 text-[12rem] opacity-10"></i>
                    </div>
                    <div class="space-y-6">
                        <div class="glass-card p-8 rounded-[3rem]">
                            <h4 class="text-xs font-black uppercase text-slate-500 mb-6 italic tracking-widest border-b border-white/5 pb-2">Sıradaki Dersler</h4>
                            <div class="space-y-3">${(lessons||[]).map(l => `<div class="p-4 liquid-inner rounded-xl flex justify-between items-center font-bold text-sm"><span>${l.title}</span><span class="text-[10px] opacity-60">${new Date(l.scheduled_at).toLocaleDateString('tr-TR')}</span></div>`).join('') || 'Ders yok.'}</div>
                        </div>
                        <div class="glass-card p-8 rounded-[3rem]">
                            <h4 class="text-xs font-black uppercase text-slate-500 mb-6 italic tracking-widest border-b border-white/5 pb-2">Aktif Ödevler</h4>
                            <div class="space-y-3">${(hws||[]).map(h => `<div class="p-4 liquid-inner rounded-xl flex justify-between items-center font-bold text-sm"><span>${h.title}</span><i class="fa-solid fa-clock-rotate-left opacity-40"></i></div>`).join('') || 'Ödev yok.'}</div>
                        </div>
                    </div>
                </div>`;
        }

        async function renderLessons() {
            document.getElementById('page-title').innerText = 'Derslerim';
            const { data } = await supabaseClient.from('lessons').select('*').eq('student_id', userProfile.id).order('scheduled_at', { ascending: true });
            const active = (data||[]).filter(l => !l.is_completed);
            const past = (data||[]).filter(l => l.is_completed);
            
            document.getElementById('view-content').innerHTML = `
                <div class="space-y-12">
                    <div>
                        <h3 class="text-[10px] font-black uppercase text-blue-500 mb-8 italic tracking-widest"><i class="fa-solid fa-satellite-dish mr-2"></i>Aktif ve Planlı Dersler</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${active.map(l => `<div class="glass-card p-10 rounded-[3.5rem] shadow-xl flex flex-col justify-between h-80"><div><h4 class="text-2xl font-black mb-2 italic text-white">${l.title}</h4><p class="text-[11px] font-bold text-slate-500">${new Date(l.scheduled_at).toLocaleString('tr-TR')}</p></div><a href="${l.link}" target="_blank" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-center shadow-lg hover:brightness-110 transition">DERSE KATIL</a></div>`).join('') || '<p class="opacity-50 italic">Ders bulunmuyor.</p>'}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-[10px] font-black uppercase text-slate-500 mb-8 italic tracking-widest"><i class="fa-solid fa-archive mr-2"></i>Geçmiş Dersler</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 opacity-60">
                            ${past.map(l => `<div class="glass-card p-8 rounded-[2.5rem] h-40 flex flex-col justify-between grayscale"><div><h4 class="text-lg font-black text-white">${l.title}</h4><p class="text-[10px] text-slate-500">${new Date(l.scheduled_at).toLocaleString('tr-TR')}</p></div><span class="text-[9px] font-black text-green-500">TAMAMLANDI</span></div>`).join('') || '<p class="opacity-50 italic">Geçmiş ders yok.</p>'}
                        </div>
                    </div>
                </div>`;
        }

        async function renderExams() {
            document.getElementById('page-title').innerText = 'Sınavlarım';
            const { data } = await supabaseClient.from('external_exams').select('*').eq('student_id', userProfile.id).order('scheduled_at', { ascending: true });
            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${(data||[]).map(e => `<div class="glass-card p-10 rounded-[3.5rem] shadow-xl flex flex-col justify-between h-80 ${e.is_completed ? 'opacity-50' : ''}"><div><h4 class="text-2xl font-black mb-2 italic text-white">${e.title}</h4><p class="text-[11px] font-bold text-slate-500">${new Date(e.scheduled_at).toLocaleString('tr-TR')}</p></div><button onclick="showExamCode('${e.student_code}', '${e.link}')" class="w-full py-5 bg-orange-600 text-white rounded-2xl font-black shadow-lg">SINAVA GİRİŞ YAP</button></div>`).join('') || 'Sınav tanımlanmamış.'}
                </div>`;
        }

        async function renderHomeworks() {
            document.getElementById('page-title').innerText = 'Ödev Takibi';
            const { data: hws } = await supabaseClient.from('homeworks').select('*').eq('student_id', userProfile.id);
            const { data: subs } = await supabaseClient.from('homework_submissions').select('homework_id').eq('student_id', userProfile.id);
            const subIds = new Set((subs||[]).map(s => s.homework_id));

            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${(hws||[]).map(h => {
                        const isSent = subIds.has(h.id);
                        return `<div class="glass-card p-8 rounded-[3rem] shadow-xl flex flex-col justify-between h-72">
                            <div><h4 class="font-black text-xl text-white italic mb-2">${h.title}</h4><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Son Tarih: ${new Date(h.deadline).toLocaleString('tr-TR')}</p></div>
                            <div class="flex gap-2">
                                <button onclick="window.openPdfViewer('${h.pdf_url}', '${h.title}')" class="flex-1 py-4 border border-blue-500 text-blue-500 rounded-2xl font-black text-[10px] uppercase">Ödevi Aç</button>
                                ${isSent ? '<span class="flex-1 py-4 bg-green-500 text-white rounded-2xl font-black text-[10px] flex items-center justify-center gap-1 uppercase">GÖNDERİLDİ</span>' : `<button onclick="window.showSubmitForm('${h.id}')" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg">Yükle</button>`}
                            </div>
                        </div>`;
                    }).join('') || 'Ödev bulunmuyor.'}
                </div>`;
        }

        async function renderFiles() {
            document.getElementById('page-title').innerText = 'Ders Dosyaları';
            const { data } = await supabaseClient.from('course_files').select('*').or(`student_id.is.null,student_id.eq.${userProfile.id}`).order('created_at', {ascending: false});
            document.getElementById('view-content').innerHTML = `<div class="max-w-4xl mx-auto space-y-4">${(data||[]).map(f => `<div class="glass-card p-6 rounded-3xl flex justify-between items-center group transition hover:bg-white/5"><div class="flex items-center gap-4"><div class="w-12 h-12 liquid-inner text-red-500 rounded-xl flex items-center justify-center text-xl shadow-inner"><i class="fa-solid fa-file-pdf"></i></div><h5 class="font-black text-white text-sm uppercase">${f.title}</h5></div><button onclick="window.openPdfViewer('${f.file_url}', '${f.title}')" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase shadow-md transition hover:scale-105">Görüntüle</button></div>`).join('') || 'Dosya yok.'}</div>`;
        }

        async function renderGames() {
            document.getElementById('page-title').innerText = 'Oyun Odası';
            const { data } = await supabaseClient.from('games').select('*').order('created_at', {ascending: false});
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">${(data||[]).map(g => `<div class="glass-card p-8 rounded-[3.5rem] h-64 flex flex-col justify-between items-center text-center">
                <div class="w-20 h-20 bg-orange-600/10 text-orange-500 rounded-3xl flex items-center justify-center text-4xl shadow-inner border border-orange-500/20"><i class="fa-solid fa-gamepad"></i></div>
                <h4 class="font-black text-white uppercase italic text-sm">${g.title}</h4>
                <button onclick="window.openGameViewer('${g.title}', \`${g.html_content}\` )" class="w-full py-4 bg-orange-600 text-white rounded-2xl font-black shadow-lg">HEMEN OYNA</button>
            </div>`).join('') || 'Oyun yüklenmemiş.'}</div>`;
        }

        async function renderVideos() {
            const { data } = await supabaseClient.from('videos').select('*').order('created_at', {ascending: false});
            if(!data || data.length === 0) { document.getElementById('view-content').innerHTML = 'Henüz video yok.'; return; }
            
            let html = `<div class="flex justify-center items-center h-[75vh]"><div class="reels-container w-full max-w-[420px] mx-auto border-4 border-white/5 relative">`;
            data.forEach(v => { html += `<div class="reel-item h-full relative"><video src="${v.video_url}" loop controls class="video-player-layer"></video><div class="absolute bottom-6 left-6 right-6 z-20 pointer-events-none"><h4 class="font-black text-white text-sm drop-shadow-lg">${v.title}</h4></div></div>`; });
            document.getElementById('view-content').innerHTML = html + '</div></div>';
        }

        async function renderAnalytics() {
            document.getElementById('page-title').innerText = 'Analiz Motoru';
            const { data } = await supabaseClient.from('detailed_analyses').select('*').eq('student_id', userProfile.id).order('created_at', {ascending: false});
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                ${(data||[]).map(a => `<div class="glass-card p-8 rounded-[3.5rem] h-64 flex flex-col justify-between">
                    <div class="flex justify-between items-start"><h4 class="font-black text-white italic uppercase text-sm">${a.title}</h4><span class="px-3 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black">%${Math.round((a.correct_count/a.total_questions)*100)}</span></div>
                    <div class="flex justify-around py-4 border-y border-white/5 my-4"><div class="text-center font-black text-green-500 text-lg">${a.correct_count}<p class="text-[8px] text-slate-500 uppercase">Doğru</p></div><div class="text-center font-black text-red-500 text-lg">${a.wrong_count}<p class="text-[8px] text-slate-500 uppercase">Yanlış</p></div><div class="text-center font-black text-slate-500 text-lg">${a.empty_count}<p class="text-[8px] text-slate-500 uppercase">Boş</p></div></div>
                    <button onclick="window.showGroupedAnalysisModal('${a.task_id}', '${userProfile.id}')" class="w-full py-4 liquid-inner text-white rounded-2xl font-black text-[10px] uppercase shadow-md transition hover:bg-white/10">Detaylı Rapor</button>
                </div>`).join('') || 'Analiz bulunmuyor.'}
            </div>`;
        }

        // HELPERS
        window.closePdfViewer = () => { document.getElementById('pdf-iframe').src = ''; document.getElementById('pdf-viewer-modal').classList.add('hidden'); };
        window.openPdfViewer = (u, t) => { document.getElementById('pdf-iframe').src = u; document.getElementById('pdf-viewer-title').innerText = t; document.getElementById('pdf-viewer-modal').classList.remove('hidden'); };
        window.closeGameViewer = () => { document.getElementById('game-iframe').srcdoc = ''; document.getElementById('game-viewer-modal').classList.add('hidden'); };
        window.openGameViewer = (t, c) => { document.getElementById('game-iframe').srcdoc = c; document.getElementById('game-viewer-title').innerText = t; document.getElementById('game-viewer-modal').classList.remove('hidden'); };
        window.closeSubmitOverlay = () => { document.getElementById('submit-overlay').classList.add('hidden'); };
        window.showSubmitForm = (hid) => { document.getElementById('submit-hw-id').value = hid; studentSelectedFiles = []; window.updateFileUI(); document.getElementById('submit-overlay').classList.remove('hidden'); };
        window.addFilesToSubmission = (input) => { if(input.files) { Array.from(input.files).forEach(f => studentSelectedFiles.push(f)); window.updateFileUI(); input.value = ""; } };
        window.updateFileUI = () => { document.getElementById('file-list-container').innerHTML = studentSelectedFiles.map((f, i) => `<div class="p-3 liquid-inner rounded-xl text-[10px] font-black uppercase mb-2 flex justify-between items-center"><span>${f.name}</span><button type="button" onclick="studentSelectedFiles.splice(${i},1);window.updateFileUI();" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join(''); };
        window.showExamCode = (c, l) => { document.getElementById('exam-code-display').innerText = c; document.getElementById('copy-exam-link-btn').onclick = () => { navigator.clipboard.writeText(c); window.open(l, '_blank'); }; document.getElementById('exam-code-modal').classList.remove('hidden'); };

        window.submitHomeworkData = async () => {
            const btn = document.getElementById('submit-btn-final'); if (studentSelectedFiles.length === 0) return alert("Lütfen çözüm fotoğraflarını seçin!");
            btn.disabled = true; btn.innerText = "Gönderiliyor...";
            try {
                const urls = [];
                for(let f of studentSelectedFiles) {
                    const fname = Date.now() + "_" + f.name;
                    const { data, error } = await supabaseClient.storage.from('matota-files').upload('submissions/' + fname, f);
                    if(!error) { const { data: pUrl } = supabaseClient.storage.from('matota-files').getPublicUrl(data.path); urls.push(pUrl.publicUrl); }
                }
                const { error } = await supabaseClient.from('homework_submissions').insert([{ homework_id: document.getElementById('submit-hw-id').value, student_id: userProfile.id, file_urls: urls, note: document.getElementById('submit-note').value }]);
                if(!error) { alert("Çözüm başarıyla iletildi!"); closeSubmitOverlay(); navigate('s-homeworks'); } else throw error;
            } catch(e) { alert("Hata: " + e.message); btn.disabled = false; btn.innerText = "Bitir ve Gönder"; }
        };

        window.onload = initAuth;
    </script>
</body>
</html>
